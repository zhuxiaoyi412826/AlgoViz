<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二叉堆可视化 - 深入理解堆结构</title>
    <link rel="icon" type="image/png" href="../../../images/tubiao.png">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --border-color: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 控制面板 */
        .control-panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        input[type="number"], input[type="text"] {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            width: 120px;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        input[type="text"].wide {
            width: 200px;
        }

        button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 16px;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover:not(:disabled) {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        button.primary:hover:not(:disabled) {
            background: #2563eb;
        }

        button.success {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        button.success:hover:not(:disabled) {
            background: #16a34a;
        }

        button.danger {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        button.danger:hover:not(:disabled) {
            background: #dc2626;
        }

        button.warning {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
        }

        .mode-toggle {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 8px;
            overflow: hidden;
        }

        .mode-toggle button {
            border: none;
            border-radius: 0;
            padding: 8px 20px;
        }

        .mode-toggle button.active {
            background: var(--accent-purple);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speed-control input[type="range"] {
            width: 120px;
            accent-color: var(--accent-blue);
        }

        .speed-value {
            color: var(--accent-cyan);
            font-weight: 600;
            min-width: 40px;
        }

        /* 算法选择 */
        .algo-selector {
            display: flex;
            gap: 10px;
        }

        .algo-selector button {
            font-size: 0.8rem;
            padding: 6px 12px;
        }

        .algo-selector button.active {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        /* 公式展示区 */
        .formula-panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .formula-panel h3 {
            color: var(--accent-cyan);
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .formulas {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .formula {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .formula-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .formula-code {
            color: var(--accent-green);
            font-size: 0.95rem;
        }

        /* 视图容器 */
        .views-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .view-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .view-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .view-badge {
            background: var(--accent-purple);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* 树形视图 */
        .tree-view {
            min-height: 300px;
            position: relative;
            overflow: auto;
        }

        .tree-container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .tree-svg {
            overflow: visible;
        }

        .tree-edge {
            stroke: var(--border-color);
            stroke-width: 2;
            transition: all 0.3s;
        }

        .tree-edge.highlight {
            stroke: var(--accent-blue);
            stroke-width: 3;
        }

        .tree-node {
            cursor: pointer;
            transition: all 0.3s;
        }

        .tree-node circle {
            stroke-width: 3;
            transition: all 0.3s;
        }

        .tree-node .node-circle {
            fill: var(--bg-tertiary);
            stroke: var(--accent-blue);
        }

        .tree-node .node-circle.root {
            stroke: var(--accent-purple);
            stroke-width: 4;
        }

        .tree-node .node-circle.leaf {
            stroke: var(--accent-green);
        }

        .tree-node .node-circle.new {
            fill: var(--accent-orange);
            stroke: var(--accent-orange);
        }

        .tree-node .node-circle.comparing {
            fill: var(--accent-blue);
            stroke: var(--accent-blue);
        }

        .tree-node .node-circle.swapping {
            fill: var(--accent-red);
            stroke: var(--accent-red);
        }

        .tree-node .node-circle.sorted {
            fill: var(--accent-green);
            stroke: var(--accent-green);
        }

        .tree-node .node-text {
            fill: white;
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }

        .tree-node .index-text {
            fill: var(--text-secondary);
            font-size: 10px;
            text-anchor: middle;
            pointer-events: none;
        }

        .tree-node:hover circle {
            filter: brightness(1.2);
        }

        /* 数组视图 */
        .array-view {
            min-height: 120px;
            overflow-x: auto;
        }

        .array-container {
            display: flex;
            justify-content: center;
            gap: 4px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .array-cell {
            width: 50px;
            height: 50px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }

        .array-cell .cell-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .array-cell .cell-index {
            position: absolute;
            bottom: -20px;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .array-cell.highlight-parent {
            border-color: var(--accent-purple);
            box-shadow: 0 0 10px var(--accent-purple);
        }

        .array-cell.highlight-left {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .array-cell.highlight-right {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .array-cell.new {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
        }

        .array-cell.comparing {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .array-cell.swapping {
            background: var(--accent-red);
            border-color: var(--accent-red);
            animation: pulse 0.3s infinite;
        }

        .array-cell.sorted {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .array-cell.empty {
            background: transparent;
            border: 2px dashed var(--border-color);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 日志区域 */
        .log-panel {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px solid var(--border-color);
            max-height: 200px;
            overflow-y: auto;
        }

        .log-panel h3 {
            color: var(--accent-cyan);
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .log-content {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry .step {
            color: var(--accent-purple);
            margin-right: 8px;
        }

        .log-entry .action {
            color: var(--accent-blue);
        }

        .log-entry .highlight {
            color: var(--accent-orange);
            font-weight: 600;
        }

        .log-entry .compare {
            color: var(--accent-cyan);
        }

        .log-entry .swap {
            color: var(--accent-red);
        }

        .log-entry .success {
            color: var(--accent-green);
        }

        /* 图例 */
        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 10px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        /* 播放控制 */
        .playback-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .step-counter {
            color: var(--accent-cyan);
            font-weight: 600;
            min-width: 80px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 10px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .status-value {
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .control-row {
                flex-direction: column;
                align-items: stretch;
            }

            .formulas {
                flex-direction: column;
                gap: 10px;
            }

            .array-cell {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>二叉堆可视化</h1>
            <p>深入理解堆结构 | 上浮、下沉、建堆、堆排序</p>
        </header>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="control-row">
                <div class="control-group">
                    <label>堆类型:</label>
                    <div class="mode-toggle">
                        <button id="btn-min-heap" class="active">小顶堆</button>
                        <button id="btn-max-heap">大顶堆</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>数值范围:</label>
                    <input type="number" id="min-value" value="1" min="1" max="100">
                    <span>~</span>
                    <input type="number" id="max-value" value="99" min="1" max="999">
                </div>

                <div class="control-group">
                    <label>允许重复:</label>
                    <button id="btn-duplicate" class="active">否</button>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <input type="number" id="input-value" placeholder="输入数值" min="1">
                    <button id="btn-insert" class="primary">插入节点</button>
                </div>

                <div class="control-group">
                    <input type="text" id="input-array" class="wide" placeholder="输入数组: 5,3,8,1,9">
                    <button id="btn-import">导入数组</button>
                </div>

                <div class="control-group">
                    <button id="btn-random">随机生成</button>
                    <button id="btn-delete-root" class="warning">删除堆顶</button>
                    <button id="btn-clear" class="danger">清空堆</button>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label>建堆算法:</label>
                    <div class="algo-selector">
                        <button id="btn-algo-insert" class="active">逐个插入上浮</button>
                        <button id="btn-algo-heapify">倒序下沉建堆</button>
                    </div>
                </div>

                <div class="control-group">
                    <button id="btn-build-heap">执行建堆</button>
                </div>

                <div class="control-group">
                    <button id="btn-heap-sort" class="success">堆排序</button>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label>播放控制:</label>
                    <div class="playback-controls">
                        <button id="btn-step-back" title="上一步">◀◀</button>
                        <button id="btn-play" class="primary" title="播放">▶</button>
                        <button id="btn-step-forward" title="下一步">▶▶</button>
                        <button id="btn-pause" title="暂停">⏸</button>
                        <button id="btn-stop" class="danger" title="停止">⏹</button>
                    </div>
                </div>

                <div class="control-group speed-control">
                    <label>速度:</label>
                    <input type="range" id="speed-slider" min="0.5" max="2" step="0.1" value="1">
                    <span class="speed-value" id="speed-value">1x</span>
                </div>

                <div class="step-counter">
                    步骤: <span id="current-step">0</span> / <span id="total-steps">0</span>
                </div>
            </div>
        </div>

        <!-- 公式展示 -->
        <div class="formula-panel">
            <h3>下标关系公式（鼠标悬浮节点查看关联关系）</h3>
            <div class="formulas">
                <div class="formula">
                    <span class="formula-label">父节点:</span>
                    <span class="formula-code">parent = (i - 1) / 2</span>
                </div>
                <div class="formula">
                    <span class="formula-label">左孩子:</span>
                    <span class="formula-code">left = i * 2 + 1</span>
                </div>
                <div class="formula">
                    <span class="formula-label">右孩子:</span>
                    <span class="formula-code">right = i * 2 + 2</span>
                </div>
            </div>
        </div>

        <!-- 树形视图 -->
        <div class="view-section">
            <div class="view-header">
                <span class="view-title">树形结构视图</span>
                <span class="view-badge">完全二叉树</span>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent-purple);"></div>
                    <span>根节点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent-green);"></div>
                    <span>叶子节点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent-orange);"></div>
                    <span>新节点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent-blue);"></div>
                    <span>比较中</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent-red);"></div>
                    <span>交换中</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent-cyan);"></div>
                    <span>关联节点</span>
                </div>
            </div>

            <div class="tree-view" id="tree-view">
                <div class="tree-container" id="tree-container">
                    <div class="empty-state" id="tree-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        <p>堆为空，请插入节点或随机生成</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数组视图 -->
        <div class="view-section">
            <div class="view-header">
                <span class="view-title">底层数组视图</span>
                <span class="view-badge">数组实现</span>
            </div>

            <div class="status-bar">
                <div class="status-item">
                    <span class="status-label">堆大小:</span>
                    <span class="status-value" id="heap-size">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">堆类型:</span>
                    <span class="status-value" id="heap-type">小顶堆</span>
                </div>
                <div class="status-item">
                    <span class="status-label">树高度:</span>
                    <span class="status-value" id="tree-height">0</span>
                </div>
            </div>

            <div class="array-view" id="array-view">
                <div class="array-container" id="array-container">
                    <div class="empty-state" id="array-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                        </svg>
                        <p>数组为空</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="log-panel">
            <h3>操作日志</h3>
            <div class="log-content" id="log-content">
                <div class="log-entry">
                    <span class="action">等待操作...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 堆可视化核心类 ====================
        class HeapVisualizer {
            constructor() {
                this.heap = [];
                this.isMaxHeap = false;
                this.allowDuplicate = false;
                this.minValue = 1;
                this.maxValue = 99;
                this.steps = [];
                this.currentStepIndex = 0;
                this.isPlaying = false;
                this.animationSpeed = 1;
                this.buildAlgorithm = 'insert'; // 'insert' or 'heapify'
                this.animationTimer = null;
                this.highlightedIndices = { parent: -1, left: -1, right: -1 };

                this.initEventListeners();
                this.updateUI();
            }

            // ==================== 事件监听 ====================
            initEventListeners() {
                // 堆类型切换
                document.getElementById('btn-min-heap').addEventListener('click', () => this.setHeapType(false));
                document.getElementById('btn-max-heap').addEventListener('click', () => this.setHeapType(true));

                // 重复值切换
                document.getElementById('btn-duplicate').addEventListener('click', () => this.toggleDuplicate());

                // 数值范围
                document.getElementById('min-value').addEventListener('change', (e) => {
                    this.minValue = parseInt(e.target.value) || 1;
                });
                document.getElementById('max-value').addEventListener('change', (e) => {
                    this.maxValue = parseInt(e.target.value) || 99;
                });

                // 数据操作
                document.getElementById('btn-insert').addEventListener('click', () => this.handleInsert());
                document.getElementById('btn-import').addEventListener('click', () => this.handleImport());
                document.getElementById('btn-random').addEventListener('click', () => this.handleRandom());
                document.getElementById('btn-delete-root').addEventListener('click', () => this.handleDeleteRoot());
                document.getElementById('btn-clear').addEventListener('click', () => this.handleClear());

                // 建堆算法
                document.getElementById('btn-algo-insert').addEventListener('click', () => this.setBuildAlgorithm('insert'));
                document.getElementById('btn-algo-heapify').addEventListener('click', () => this.setBuildAlgorithm('heapify'));
                document.getElementById('btn-build-heap').addEventListener('click', () => this.handleBuildHeap());

                // 堆排序
                document.getElementById('btn-heap-sort').addEventListener('click', () => this.handleHeapSort());

                // 播放控制
                document.getElementById('btn-play').addEventListener('click', () => this.play());
                document.getElementById('btn-pause').addEventListener('click', () => this.pause());
                document.getElementById('btn-stop').addEventListener('click', () => this.stop());
                document.getElementById('btn-step-forward').addEventListener('click', () => this.stepForward());
                document.getElementById('btn-step-back').addEventListener('click', () => this.stepBack());

                // 速度控制
                document.getElementById('speed-slider').addEventListener('input', (e) => {
                    this.animationSpeed = parseFloat(e.target.value);
                    document.getElementById('speed-value').textContent = this.animationSpeed + 'x';
                });

                // 回车键插入
                document.getElementById('input-value').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleInsert();
                });
            }

            // ==================== 堆类型切换 ====================
            setHeapType(isMax) {
                this.isMaxHeap = isMax;
                document.getElementById('btn-min-heap').classList.toggle('active', !isMax);
                document.getElementById('btn-max-heap').classList.toggle('active', isMax);
                document.getElementById('heap-type').textContent = isMax ? '大顶堆' : '小顶堆';

                if (this.heap.length > 0) {
                    this.rebuildHeap();
                }
                this.log(`切换为${isMax ? '大顶堆' : '小顶堆'}`, 'action');
            }

            toggleDuplicate() {
                this.allowDuplicate = !this.allowDuplicate;
                const btn = document.getElementById('btn-duplicate');
                btn.textContent = this.allowDuplicate ? '是' : '否';
                btn.classList.toggle('active', this.allowDuplicate);
                this.log(`允许重复值: ${this.allowDuplicate ? '是' : '否'}`, 'action');
            }

            setBuildAlgorithm(algo) {
                this.buildAlgorithm = algo;
                document.getElementById('btn-algo-insert').classList.toggle('active', algo === 'insert');
                document.getElementById('btn-algo-heapify').classList.toggle('active', algo === 'heapify');
            }

            // ==================== 数据操作 ====================
            handleInsert() {
                const input = document.getElementById('input-value');
                const valueStr = input.value.trim();
                
                if (!valueStr) {
                    this.log('请输入数值', 'error');
                    return;
                }
                
                const value = parseInt(valueStr);
                if (isNaN(value)) {
                    this.log('请输入有效数值', 'error');
                    return;
                }
                
                this.insert(value);
                input.value = '';
                input.focus();
            }

            handleImport() {
                const input = document.getElementById('input-array');
                const text = input.value.trim();
                if (!text) {
                    this.log('请输入数组', 'error');
                    return;
                }

                const numbers = text.split(/[,\s]+/).map(s => parseInt(s.trim())).filter(n => !isNaN(n));
                if (numbers.length === 0) {
                    this.log('未找到有效数字', 'error');
                    return;
                }

                this.clear();
                this.log(`导入数组: [${numbers.join(', ')}]`, 'action');

                for (const num of numbers) {
                    if (num >= this.minValue && num <= this.maxValue) {
                        if (!this.allowDuplicate && this.heap.includes(num)) continue;
                        this.heap.push(num);
                    }
                }

                this.buildHeap();
                input.value = '';
            }

            handleRandom() {
                this.clear();
                const count = Math.floor(Math.random() * 6) + 5; // 5-10个元素
                const numbers = [];

                for (let i = 0; i < count; i++) {
                    let num;
                    do {
                        num = Math.floor(Math.random() * (this.maxValue - this.minValue + 1)) + this.minValue;
                    } while (!this.allowDuplicate && numbers.includes(num));
                    numbers.push(num);
                }

                this.heap = numbers;
                this.log(`随机生成: [${numbers.join(', ')}]`, 'action');
                this.buildHeap();
            }

            handleDeleteRoot() {
                if (this.heap.length === 0) {
                    this.log('堆为空，无法删除', 'error');
                    return;
                }
                this.deleteRoot();
            }

            handleClear() {
                this.clear();
                this.log('堆已清空', 'action');
                this.updateUI();
            }

            handleBuildHeap() {
                if (this.heap.length === 0) {
                    this.log('堆为空，请先添加元素', 'error');
                    return;
                }
                this.buildHeap();
            }

            handleHeapSort() {
                if (this.heap.length === 0) {
                    this.log('堆为空，无法排序', 'error');
                    return;
                }
                this.heapSort();
            }

            // ==================== 核心算法 ====================

            // 插入元素
            insert(value) {
                console.log('insert called with value:', value);
                
                if (value < this.minValue || value > this.maxValue) {
                    this.log(`数值超出范围 [${this.minValue}, ${this.maxValue}]`, 'error');
                    return;
                }

                if (!this.allowDuplicate && this.heap.includes(value)) {
                    this.log(`重复值 ${value} 不允许插入`, 'error');
                    return;
                }

                this.stop();
                this.heap.push(value);
                console.log('heap after push:', this.heap);
                this.log(`插入元素 ${value}，开始上浮操作`, 'action');

                // 生成上浮步骤
                const newIndex = this.heap.length - 1;
                this.generateShiftUpSteps(newIndex);

                console.log('steps generated:', this.steps.length);
                this.currentStepIndex = 0;
                this.updateStepCounter();
                this.play();
            }

            // 生成上浮步骤
            generateShiftUpSteps(index) {
                const steps = [];
                let i = index;
                const compareSymbol = this.isMaxHeap ? '>' : '<';
                const rule = this.isMaxHeap ? '大顶堆' : '小顶堆';

                // 如果是根节点，不需要上浮
                if (i === 0) {
                    steps.push({
                        type: 'done',
                        indices: [0],
                        heap: [...this.heap],
                        message: `插入 ${this.heap[0]} 作为根节点`,
                        subMessage: '位置正确'
                    });
                    this.steps = steps;
                    console.log('Root node inserted, step created');
                    return;
                }

                while (i > 0) {
                    const parentIndex = Math.floor((i - 1) / 2);

                    steps.push({
                        type: 'compare',
                        indices: [i, parentIndex],
                        heap: [...this.heap],
                        message: `比较下标${i}[${this.heap[i]}] 与 父节点下标${parentIndex}[${this.heap[parentIndex]}]`,
                        subMessage: `${this.heap[i]} ${compareSymbol} ${this.heap[parentIndex]}?`
                    });

                    if ((this.isMaxHeap && this.heap[i] > this.heap[parentIndex]) ||
                        (!this.isMaxHeap && this.heap[i] < this.heap[parentIndex])) {
                        steps.push({
                            type: 'swap',
                            indices: [i, parentIndex],
                            heap: [...this.heap],
                            message: `交换 [${this.heap[i]}] 和 [${this.heap[parentIndex]}]`,
                            subMessage: `不符合${rule}规则，执行交换`
                        });

                        // 执行交换
                        [this.heap[i], this.heap[parentIndex]] = [this.heap[parentIndex], this.heap[i]];
                        i = parentIndex;
                    } else {
                        steps.push({
                            type: 'done',
                            indices: [i],
                            heap: [...this.heap],
                            message: `位置正确，停止上浮`,
                            subMessage: `${rule}性质已满足`
                        });
                        break;
                    }
                }

                if (steps.length > 0) {
                    this.steps = steps;
                }
                console.log('Shift up steps:', steps.length);
            }

            // 删除堆顶
            deleteRoot() {
                this.stop();
                if (this.heap.length === 0) return;

                const removed = this.heap[0];
                this.log(`删除堆顶 ${removed}，末尾元素 ${this.heap[this.heap.length - 1]} 上移`, 'action');

                this.steps = [];

                // 记录删除前的状态
                this.steps.push({
                    type: 'remove-root',
                    indices: [0],
                    heap: [...this.heap],
                    message: `移除根节点 ${removed}`,
                    subMessage: `用末尾元素替代`
                });

                // 用末尾元素替换根节点
                this.heap[0] = this.heap[this.heap.length - 1];
                this.heap.pop();

                if (this.heap.length > 0) {
                    this.steps.push({
                        type: 'replace',
                        indices: [0],
                        heap: [...this.heap],
                        message: `末尾元素 ${this.heap[0]} 移到根节点`,
                        subMessage: '开始下沉调整'
                    });

                    // 生成下沉步骤
                    this.generateShiftDownSteps(0);
                }

                this.currentStepIndex = 0;
                this.updateStepCounter();
                this.play();
            }

            // 生成下沉步骤
            generateShiftDownSteps(index) {
                const steps = [];
                let i = index;
                const heapSize = this.heap.length;

                while (true) {
                    let smallestOrLargest = i;
                    const left = i * 2 + 1;
                    const right = i * 2 + 2;

                    if (left < heapSize) {
                        steps.push({
                            type: 'compare',
                            indices: [i, left],
                            heap: [...this.heap],
                            message: `比较下标${i}[${this.heap[i]}] 与 左孩子下标${left}[${this.heap[left]}]`,
                            subMessage: `找出${this.isMaxHeap ? '最大值' : '最小值'}孩子`
                        });

                        if ((this.isMaxHeap && this.heap[left] > this.heap[smallestOrLargest]) ||
                            (!this.isMaxHeap && this.heap[left] < this.heap[smallestOrLargest])) {
                            smallestOrLargest = left;
                        }
                    }

                    if (right < heapSize) {
                        steps.push({
                            type: 'compare',
                            indices: [smallestOrLargest, right],
                            heap: [...this.heap],
                            message: `比较下标${smallestOrLargest}[${this.heap[smallestOrLargest]}] 与 右孩子下标${right}[${this.heap[right]}]`,
                            subMessage: `找出${this.isMaxHeap ? '最大值' : '最小值'}孩子`
                        });

                        if ((this.isMaxHeap && this.heap[right] > this.heap[smallestOrLargest]) ||
                            (!this.isMaxHeap && this.heap[right] < this.heap[smallestOrLargest])) {
                            smallestOrLargest = right;
                        }
                    }

                    if (smallestOrLargest !== i) {
                        steps.push({
                            type: 'swap',
                            indices: [i, smallestOrLargest],
                            heap: [...this.heap],
                            message: `交换 [${this.heap[i]}] 和 [${this.heap[smallestOrLargest]}]`,
                            subMessage: '下沉一层'
                        });

                        [this.heap[i], this.heap[smallestOrLargest]] = [this.heap[smallestOrLargest], this.heap[i]];
                        i = smallestOrLargest;
                    } else {
                        steps.push({
                            type: 'done',
                            indices: [i],
                            heap: [...this.heap],
                            message: `下沉调整完成`,
                            subMessage: `${this.isMaxHeap ? '大顶堆' : '小顶堆'}性质满足`
                        });
                        break;
                    }

                    if (i >= heapSize) break;
                }

                this.steps = steps;
            }

            // 重建堆
            rebuildHeap() {
                this.heap = [];
                const tempArray = [...this.heap];
                this.buildHeap();
            }

            // 建堆
            buildHeap() {
                this.stop();

                if (this.heap.length === 0) {
                    this.log('堆为空', 'error');
                    return;
                }

                this.log(`使用${this.buildAlgorithm === 'insert' ? '逐个插入上浮' : '倒序下沉'}建堆`, 'action');
                this.steps = [];

                if (this.buildAlgorithm === 'insert') {
                    this.buildHeapByInsertion();
                } else {
                    this.buildHeapByHeapify();
                }

                this.currentStepIndex = 0;
                this.updateStepCounter();

                if (this.steps.length === 0) {
                    this.updateUI();
                    this.log('建堆完成', 'success');
                } else {
                    this.play();
                }
            }

            // 逐个插入建堆
            buildHeapByInsertion() {
                const originalHeap = [...this.heap];
                this.heap = [];
                const allSteps = [];

                for (let i = 0; i < originalHeap.length; i++) {
                    this.heap.push(originalHeap[i]);

                    // 生成上浮步骤
                    const steps = this.generateShiftUpStepsSimple(this.heap.length - 1);
                    allSteps.push(...steps);
                }

                this.steps = allSteps;
            }

            // 生成上浮步骤（不修改heap，返回步骤数组）
            generateShiftUpStepsSimple(index) {
                const steps = [];
                let i = index;
                const compareSymbol = this.isMaxHeap ? '>' : '<';
                const rule = this.isMaxHeap ? '大顶堆' : '小顶堆';

                // 记录初始插入状态
                if (i === 0) {
                    steps.push({
                        type: 'done',
                        indices: [0],
                        heap: [...this.heap],
                        message: `插入 ${this.heap[0]} 作为根节点`,
                        subMessage: '位置正确'
                    });
                    return steps;
                }

                while (i > 0) {
                    const parent = Math.floor((i - 1) / 2);

                    steps.push({
                        type: 'compare',
                        indices: [i, parent],
                        heap: [...this.heap],
                        message: `插入 ${this.heap[i]}，比较下标${i}[${this.heap[i]}] 与 父节点下标${parent}[${this.heap[parent]}]`,
                        subMessage: `${this.heap[i]} ${compareSymbol} ${this.heap[parent]}?`
                    });

                    if ((this.isMaxHeap && this.heap[i] > this.heap[parent]) ||
                        (!this.isMaxHeap && this.heap[i] < this.heap[parent])) {
                        steps.push({
                            type: 'swap',
                            indices: [i, parent],
                            heap: [...this.heap],
                            message: `交换 [${this.heap[i]}] 和 [${this.heap[parent]}]`,
                            subMessage: `不符合${rule}，执行交换`
                        });

                        [this.heap[i], this.heap[parent]] = [this.heap[parent], this.heap[i]];
                        i = parent;
                    } else {
                        steps.push({
                            type: 'done',
                            indices: [i],
                            heap: [...this.heap],
                            message: `插入完成`,
                            subMessage: `${rule}性质满足`
                        });
                        break;
                    }
                }

                if (i === 0 && this.heap.length > 1) {
                    steps.push({
                        type: 'done',
                        indices: [0],
                        heap: [...this.heap],
                        message: `上浮到根节点`,
                        subMessage: '停止上浮'
                    });
                }

                return steps;
            }

            // 倒序下沉建堆（Heapify）
            buildHeapByHeapify() {
                const heapArray = [...this.heap];
                const n = heapArray.length;
                const steps = [];

                // 从最后一个非叶子节点开始
                const startIndex = Math.floor(n / 2) - 1;

                for (let i = startIndex; i >= 0; i--) {
                    const processSteps = this.heapifyProcess(i, n, heapArray);
                    steps.push(...processSteps);
                }

                // 最后应用完整的建堆结果
                this.heapifyFinal(heapArray, n);
                this.steps = steps;
            }

            heapifyProcess(index, heapSize, heapArray) {
                const processSteps = [];
                let i = index;

                while (true) {
                    let extremum = i;
                    const left = i * 2 + 1;
                    const right = i * 2 + 2;

                    if (left < heapSize) {
                        processSteps.push({
                            type: 'compare',
                            indices: [i, left],
                            heap: [...heapArray],
                            message: `下沉调整节点${i}[${heapArray[i]}]，比较与左孩子${left}[${heapArray[left]}]`,
                            subMessage: `找出${this.isMaxHeap ? '最大值' : '最小值'}孩子`
                        });

                        if ((this.isMaxHeap && heapArray[left] > heapArray[extremum]) ||
                            (!this.isMaxHeap && heapArray[left] < heapArray[extremum])) {
                            extremum = left;
                        }
                    }

                    if (right < heapSize) {
                        processSteps.push({
                            type: 'compare',
                            indices: [extremum, right],
                            heap: [...heapArray],
                            message: `比较 ${extremum}[${heapArray[extremum]}] 与 右孩子${right}[${heapArray[right]}]`,
                            subMessage: `确定${this.isMaxHeap ? '最大值' : '最小值'}`
                        });

                        if ((this.isMaxHeap && heapArray[right] > heapArray[extremum]) ||
                            (!this.isMaxHeap && heapArray[right] < heapArray[extremum])) {
                            extremum = right;
                        }
                    }

                    if (extremum !== i) {
                        processSteps.push({
                            type: 'swap',
                            indices: [i, extremum],
                            heap: [...heapArray],
                            message: `交换 [${heapArray[i]}] 和 [${heapArray[extremum]}]`,
                            subMessage: '下沉一层'
                        });

                        [heapArray[i], heapArray[extremum]] = [heapArray[extremum], heapArray[i]];
                        i = extremum;
                    } else {
                        processSteps.push({
                            type: 'done',
                            indices: [i],
                            heap: [...heapArray],
                            message: `节点 ${i} 下沉完成`,
                            subMessage: `${this.isMaxHeap ? '大顶堆' : '小顶堆'}性质满足`
                        });
                        break;
                    }
                }
                return processSteps;
            }

            // 最终建堆（无动画，直接完成）
            heapifyFinal(heapArray, heapSize) {
                let i = Math.floor(heapSize / 2) - 1;
                while (i >= 0) {
                    this.siftDown(heapArray, i, heapSize);
                    i--;
                }
            }

            siftDown(heapArray, index, heapSize) {
                let i = index;
                while (true) {
                    let extremum = i;
                    const left = i * 2 + 1;
                    const right = i * 2 + 2;

                    if (left < heapSize) {
                        if ((this.isMaxHeap && heapArray[left] > heapArray[extremum]) ||
                            (!this.isMaxHeap && heapArray[left] < heapArray[extremum])) {
                            extremum = left;
                        }
                    }

                    if (right < heapSize) {
                        if ((this.isMaxHeap && heapArray[right] > heapArray[extremum]) ||
                            (!this.isMaxHeap && heapArray[right] < heapArray[extremum])) {
                            extremum = right;
                        }
                    }

                    if (extremum !== i) {
                        [heapArray[i], heapArray[extremum]] = [heapArray[extremum], heapArray[i]];
                        i = extremum;
                    } else {
                        break;
                    }
                }
            }

            // 堆排序
            heapSort() {
                this.stop();

                if (this.heap.length === 0) {
                    this.log('堆为空', 'error');
                    return;
                }

                this.log('开始堆排序', 'action');
                this.steps = [];

                const sorted = [];
                const heapCopy = [...this.heap];
                let currentHeap = [...heapCopy];
                let heapSize = currentHeap.length;

                // 首次建堆
                this.buildHeapStepsForSort(currentHeap, heapSize, sorted);
            }

            buildHeapStepsForSort(heapArray, heapSize, sorted) {
                const n = heapSize;
                let startIndex = Math.floor(n / 2) - 1;

                for (let i = startIndex; i >= 0; i--) {
                    this.heapifyForSort(i, heapSize, heapArray, sorted);
                }
            }

            heapifyForSort(index, heapSize, heapArray, sorted) {
                let i = index;

                while (true) {
                    let extremum = i;
                    const left = i * 2 + 1;
                    const right = i * 2 + 2;

                    if (left < heapSize) {
                        this.steps.push({
                            type: 'compare',
                            indices: [i, left],
                            heap: [...heapArray],
                            sorted: [...sorted],
                            message: `建堆: 比较下标${i}[${heapArray[i]}] 与 左孩子${left}[${heapArray[left]}]`,
                            subMessage: '找出extremum孩子'
                        });

                        if ((this.isMaxHeap && heapArray[left] > heapArray[extremum]) ||
                            (!this.isMaxHeap && heapArray[left] < heapArray[extremum])) {
                            extremum = left;
                        }
                    }

                    if (right < heapSize) {
                        this.steps.push({
                            type: 'compare',
                            indices: [extremum, right],
                            heap: [...heapArray],
                            sorted: [...sorted],
                            message: `建堆: 比较 ${extremum}[${heapArray[extremum]}] 与 右孩子${right}[${heapArray[right]}]`,
                            subMessage: '确定extremum'
                        });

                        if ((this.isMaxHeap && heapArray[right] > heapArray[extremum]) ||
                            (!this.isMaxHeap && heapArray[right] < heapArray[extremum])) {
                            extremum = right;
                        }
                    }

                    if (extremum !== i) {
                        this.steps.push({
                            type: 'swap',
                            indices: [i, extremum],
                            heap: [...heapArray],
                            sorted: [...sorted],
                            message: `建堆: 交换 [${heapArray[i]}] 和 [${heapArray[extremum]}]`,
                            subMessage: '下沉一层'
                        });

                        [heapArray[i], heapArray[extremum]] = [heapArray[extremum], heapArray[i]];
                        i = extremum;
                    } else {
                        break;
                    }
                }
            }

            // 堆排序主循环
            heapSortSteps() {
                const sorted = [];
                let heapArray = [...this.heap];
                let heapSize = heapArray.length;

                while (heapSize > 1) {
                    // 交换堆顶和末尾
                    this.steps.push({
                        type: 'swap',
                        indices: [0, heapSize - 1],
                        heap: [...heapArray],
                        sorted: [...sorted],
                        message: `交换堆顶 ${heapArray[0]} 和末尾 ${heapArray[heapSize - 1]}`,
                        subMessage: `有序区增加: ${heapArray[0]}`
                    });

                    [heapArray[0], heapArray[heapSize - 1]] = [heapArray[heapSize - 1], heapArray[0]];
                    sorted.unshift(heapArray[heapSize - 1]);
                    heapSize--;

                    // 标记已排序
                    this.steps.push({
                        type: 'sorted',
                        indices: [],
                        heap: [...heapArray],
                        sorted: [...sorted],
                        message: `堆顶 ${sorted[0]} 移至有序区`,
                        subMessage: `堆大小: ${heapSize}`
                    });

                    // 下沉调整
                    if (heapSize > 1) {
                        this.heapifyForSortLoop(0, heapSize, heapArray, sorted);
                    }
                }

                // 最后一个元素
                sorted.unshift(heapArray[0]);
                this.steps.push({
                    type: 'complete',
                    indices: [],
                    heap: [],
                    sorted: [...sorted],
                    message: `排序完成`,
                    subMessage: `有序数组: [${sorted.join(', ')}]`
                });
            }

            heapifyForSortLoop(index, heapSize, heapArray, sorted) {
                let i = index;

                while (true) {
                    let extremum = i;
                    const left = i * 2 + 1;
                    const right = i * 2 + 2;

                    if (left < heapSize) {
                        this.steps.push({
                            type: 'compare',
                            indices: [i, left],
                            heap: [...heapArray],
                            sorted: [...sorted],
                            message: `调整: 比较下标${i}[${heapArray[i]}] 与 左孩子${left}[${heapArray[left]}]`,
                            subMessage: '找出extremum'
                        });

                        if ((this.isMaxHeap && heapArray[left] > heapArray[extremum]) ||
                            (!this.isMaxHeap && heapArray[left] < heapArray[extremum])) {
                            extremum = left;
                        }
                    }

                    if (right < heapSize) {
                        this.steps.push({
                            type: 'compare',
                            indices: [extremum, right],
                            heap: [...heapArray],
                            sorted: [...sorted],
                            message: `调整: 比较 ${extremum}[${heapArray[extremum]}] 与 右孩子${right}[${heapArray[right]}]`,
                            subMessage: '确定extremum'
                        });

                        if ((this.isMaxHeap && heapArray[right] > heapArray[extremum]) ||
                            (!this.isMaxHeap && heapArray[right] < heapArray[extremum])) {
                            extremum = right;
                        }
                    }

                    if (extremum !== i) {
                        this.steps.push({
                            type: 'swap',
                            indices: [i, extremum],
                            heap: [...heapArray],
                            sorted: [...sorted],
                            message: `调整: 交换 [${heapArray[i]}] 和 [${heapArray[extremum]}]`,
                            subMessage: '下沉一层'
                        });

                        [heapArray[i], heapArray[extremum]] = [heapArray[extremum], heapArray[i]];
                        i = extremum;
                    } else {
                        break;
                    }
                }
            }

            // ==================== 播放控制 ====================
            play() {
                console.log('play called, steps:', this.steps.length);
                if (this.steps.length === 0) {
                    console.log('No steps, updating UI directly');
                    this.updateUI();
                    return;
                }

                this.isPlaying = true;
                this.updatePlayButtons();

                const executeStep = () => {
                    if (!this.isPlaying || this.currentStepIndex >= this.steps.length) {
                        this.isPlaying = false;
                        this.updatePlayButtons();
                        this.log('操作完成', 'success');
                        return;
                    }

                    console.log('Executing step:', this.currentStepIndex);
                    this.executeStep(this.currentStepIndex);
                    this.currentStepIndex++;
                    this.updateStepCounter();

                    const delay = 1000 / this.animationSpeed;
                    this.animationTimer = setTimeout(executeStep, delay);
                };

                executeStep();
            }

            pause() {
                this.isPlaying = false;
                if (this.animationTimer) {
                    clearTimeout(this.animationTimer);
                    this.animationTimer = null;
                }
                this.updatePlayButtons();
                this.log('暂停', 'action');
            }

            stop() {
                this.isPlaying = false;
                if (this.animationTimer) {
                    clearTimeout(this.animationTimer);
                    this.animationTimer = null;
                }
                this.currentStepIndex = 0;
                this.updateStepCounter();
                this.updatePlayButtons();
                this.clearHighlights();
            }

            stepForward() {
                if (this.currentStepIndex < this.steps.length) {
                    this.executeStep(this.currentStepIndex);
                    this.currentStepIndex++;
                    this.updateStepCounter();
                }
            }

            stepBack() {
                if (this.currentStepIndex > 0) {
                    this.currentStepIndex--;
                    // 重新执行到上一步
                    this.heap = this.steps[this.currentStepIndex]?.heap || [...this.heap];
                    this.updateUI();
                }
            }

            executeStep(index) {
                const step = this.steps[index];
                if (!step) return;

                // 更新堆状态
                if (step.heap) {
                    this.heap = [...step.heap];
                }

                // 添加日志
                this.log(step.message, step.type === 'compare' ? 'compare' : (step.type === 'swap' ? 'swap' : 'action'));

                if (step.subMessage) {
                    this.log(step.subMessage, step.type === 'compare' ? 'compare' : (step.type === 'swap' ? 'swap' : 'success'));
                }

                // 高亮显示
                this.highlightIndices(step);

                // 更新UI
                this.updateUI();
            }

            highlightIndices(step) {
                this.clearHighlights();

                if (!step.indices || step.indices.length === 0) return;

                const type = step.type;
                const indices = step.indices;

                if (type === 'compare') {
                    this.highlightedIndices = { comparing: indices };
                } else if (type === 'swap') {
                    this.highlightedIndices = { swapping: indices };
                } else if (type === 'sorted') {
                    this.highlightedIndices = { sorted: indices };
                }
            }

            clearHighlights() {
                this.highlightedIndices = { parent: -1, left: -1, right: -1, comparing: [], swapping: [], sorted: [] };
            }

            updatePlayButtons() {
                document.getElementById('btn-play').disabled = this.isPlaying;
                document.getElementById('btn-pause').disabled = !this.isPlaying;
            }

            updateStepCounter() {
                document.getElementById('current-step').textContent = this.currentStepIndex;
                document.getElementById('total-steps').textContent = this.steps.length;
            }

            // ==================== UI更新 ====================
            updateUI() {
                this.updateTreeView();
                this.updateArrayView();
                this.updateStatus();
            }

            updateTreeView() {
                const container = document.getElementById('tree-container');
                const emptyState = document.getElementById('tree-empty');

                if (this.heap.length === 0) {
                    container.innerHTML = '';
                    container.appendChild(emptyState);
                    emptyState.style.display = 'flex';
                    return;
                }

                emptyState.style.display = 'none';

                // 计算树布局
                const width = Math.max(800, this.heap.length * 60);
                const height = Math.max(300, Math.ceil(Math.log2(this.heap.length + 1)) * 80);
                const nodeRadius = 25;

                let svg = `<svg class="tree-svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;

                // 计算每个节点的位置
                const positions = [];
                for (let i = 0; i < this.heap.length; i++) {
                    const level = Math.floor(Math.log2(i + 1));
                    const levelStart = Math.pow(2, level) - 1;
                    const posInLevel = i - levelStart;
                    const nodesInLevel = Math.pow(2, level);
                    const levelWidth = width / (nodesInLevel + 1);

                    const x = levelWidth * (posInLevel + 1);
                    const y = level * 70 + 40;

                    positions.push({ x, y, index: i, value: this.heap[i] });
                }

                // 绘制边
                for (let i = 1; i < this.heap.length; i++) {
                    const parent = Math.floor((i - 1) / 2);
                    const p1 = positions[parent];
                    const p2 = positions[i];

                    let edgeClass = 'tree-edge';
                    if (this.highlightedIndices.comparing?.includes(i) && this.highlightedIndices.comparing?.includes(parent)) {
                        edgeClass += ' highlight';
                    }

                    svg += `<line class="${edgeClass}" x1="${p1.x}" y1="${p1.y + nodeRadius}" x2="${p2.x}" y2="${p2.y - nodeRadius}"/>`;
                }

                // 绘制节点
                for (let i = 0; i < positions.length; i++) {
                    const pos = positions[i];
                    let circleClass = 'node-circle';

                    // 确定节点类型
                    if (i === 0) circleClass += ' root';
                    else if (i * 2 + 1 >= this.heap.length) circleClass += ' leaf';

                    // 高亮状态
                    if (this.highlightedIndices.swapping?.includes(i)) {
                        circleClass = 'node-circle swapping';
                    } else if (this.highlightedIndices.comparing?.includes(i)) {
                        circleClass = 'node-circle comparing';
                    } else if (this.highlightedIndices.sorted?.includes(i)) {
                        circleClass = 'node-circle sorted';
                    }

                    svg += `
                        <g class="tree-node" data-index="${i}" onmouseenter="heapVisualizer.handleNodeHover(${i})" onmouseleave="heapVisualizer.handleNodeLeave()">
                            <circle class="${circleClass}" cx="${pos.x}" cy="${pos.y}" r="${nodeRadius}"/>
                            <text class="node-text" x="${pos.x}" y="${pos.y}">${pos.value}</text>
                            <text class="index-text" x="${pos.x}" y="${pos.y + nodeRadius + 15}">[${i}]</text>
                        </g>
                    `;
                }

                svg += '</svg>';
                container.innerHTML = svg;
            }

            updateArrayView() {
                const container = document.getElementById('array-container');
                const emptyState = document.getElementById('array-empty');

                if (this.heap.length === 0) {
                    container.innerHTML = '';
                    container.appendChild(emptyState);
                    emptyState.style.display = 'flex';
                    return;
                }

                emptyState.style.display = 'none';

                let html = '';
                for (let i = 0; i < this.heap.length; i++) {
                    let cellClass = 'array-cell';

                    // 高亮状态
                    if (this.highlightedIndices.swapping?.includes(i)) {
                        cellClass += ' swapping';
                    } else if (this.highlightedIndices.comparing?.includes(i)) {
                        cellClass += ' comparing';
                    } else if (this.highlightedIndices.sorted?.includes(i)) {
                        cellClass += ' sorted';
                    }

                    // 关联高亮
                    if (this.highlightedIndices.parent === i) {
                        cellClass += ' highlight-parent';
                    }
                    if (this.highlightedIndices.left === i) {
                        cellClass += ' highlight-left';
                    }
                    if (this.highlightedIndices.right === i) {
                        cellClass += ' highlight-right';
                    }

                    html += `
                        <div class="${cellClass}">
                            <span class="cell-value">${this.heap[i]}</span>
                            <span class="cell-index">[${i}]</span>
                        </div>
                    `;
                }

                container.innerHTML = html;
            }

            updateStatus() {
                document.getElementById('heap-size').textContent = this.heap.length;
                document.getElementById('heap-type').textContent = this.isMaxHeap ? '大顶堆' : '小顶堆';
                document.getElementById('tree-height').textContent = this.heap.length > 0 ? Math.ceil(Math.log2(this.heap.length + 1)) : 0;
            }

            // 节点悬浮
            handleNodeHover(index) {
                const parent = Math.floor((index - 1) / 2);
                const left = index * 2 + 1;
                const right = index * 2 + 2;

                this.highlightedIndices = {
                    parent: parent >= 0 && parent < this.heap.length ? parent : -1,
                    left: left < this.heap.length ? left : -1,
                    right: right < this.heap.length ? right : -1
                };

                this.log(
                    `节点 ${index}[${this.heap[index]}] - 父节点: ${parent >= 0 ? parent : '无'}, ` +
                    `左孩子: ${left < this.heap.length ? left : '无'}, ` +
                    `右孩子: ${right < this.heap.length ? right : '无'}`,
                    'highlight'
                );

                this.updateArrayView();
            }

            handleNodeLeave() {
                this.highlightedIndices = { parent: -1, left: -1, right: -1 };
                this.updateArrayView();
            }

            // 日志
            log(message, type = 'action') {
                const logContent = document.getElementById('log-content');
                const entry = document.createElement('div');
                entry.className = 'log-entry';

                const stepNum = this.currentStepIndex + 1;
                entry.innerHTML = `
                    <span class="step">[${stepNum}]</span>
                    <span class="${type}">${message}</span>
                `;

                logContent.appendChild(entry);
                logContent.scrollTop = logContent.scrollHeight;

                // 限制日志数量
                while (logContent.children.length > 100) {
                    logContent.removeChild(logContent.firstChild);
                }
            }

            clear() {
                this.stop();
                this.heap = [];
                this.steps = [];
                this.currentStepIndex = 0;
                this.clearHighlights();
                this.updateStepCounter();
                document.getElementById('log-content').innerHTML = '<div class="log-entry"><span class="action">等待操作...</span></div>';
            }
        }

        // 初始化
        const heapVisualizer = new HeapVisualizer();
    </script>
</body>
</html>
