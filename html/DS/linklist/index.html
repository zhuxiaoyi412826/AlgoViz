<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>链表可视化交互平台</title>
  <style>
    :root {
      --primary: #8B5CF6;
      --primary-dark: #7C3AED;
      --primary-light: #A78BFA;
      --primary-bg: rgba(139, 92, 246, 0.1);
      --orange: #F97316;
      --orange-bg: rgba(249, 115, 22, 0.1);
      --green: #22C55E;
      --green-bg: rgba(34, 197, 94, 0.1);
      --red: #EF4444;
      --red-bg: rgba(239, 68, 68, 0.1);
      --gray: #6B7280;
      --gray-bg: #F3F4F6;
      --white: #FFFFFF;
      --shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
      --shadow-hover: 0 8px 30px rgba(139, 92, 246, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 50%, #DDD6FE 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    header p {
      color: var(--gray);
      font-size: 0.95rem;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
    }

    /* 左侧区域 */
    .left-area {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* 可视化区域 */
    .visualization-area {
      background: var(--white);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .viz-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--primary-bg);
    }

    .viz-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.3s ease;
    }

    .viz-icon.singly { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); }
    .viz-icon.doubly { background: linear-gradient(135deg, var(--orange) 0%, #EA580C 100%); }
    .viz-icon.circular { background: linear-gradient(135deg, var(--green) 0%, #16A34A 100%); }

    .viz-title {
      font-size: 1.3rem;
      font-weight: 700;
      transition: color 0.3s ease;
    }
    .viz-title.singly { color: var(--primary); }
    .viz-title.doubly { color: var(--orange); }
    .viz-title.circular { color: var(--green); }

    .viz-subtitle {
      font-size: 0.85rem;
      color: var(--gray);
    }

    .viz-content {
      min-height: 280px;
      background: linear-gradient(180deg, var(--primary-bg) 0%, rgba(139, 92, 246, 0.02) 100%);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-x: auto;
    }

    .viz-content.doubly-bg { background: linear-gradient(180deg, var(--orange-bg) 0%, rgba(249, 115, 22, 0.02) 100%); }
    .viz-content.circular-bg { background: linear-gradient(180deg, var(--green-bg) 0%, rgba(34, 197, 94, 0.02) 100%); }

    .chain-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 70px;
      flex-wrap: wrap;
    }

    /* 哨兵节点样式 */
    .sentinel-box {
      width: 50px;
      height: 44px;
      background: linear-gradient(135deg, #374151 0%, #1F2937 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.75rem;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    .node {
      display: flex;
      align-items: center;
      gap: 4px;
      animation: nodeAppear 0.4s ease-out;
    }

    @keyframes nodeAppear {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    .node-box {
      width: 58px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 3px 12px rgba(139, 92, 246, 0.35);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .node-box::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
    }

    .node-box.circular {
      background: linear-gradient(135deg, var(--green) 0%, #16A34A 100%);
      box-shadow: 0 3px 12px rgba(34, 197, 94, 0.35);
    }

    /* 双向链表节点样式 - 两侧有连接点 */
    .node-box.doubly {
      background: linear-gradient(135deg, var(--orange) 0%, #EA580C 100%);
      box-shadow: 0 3px 12px rgba(249, 115, 22, 0.35);
      position: relative;
    }

    .node-box.doubly::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background: var(--orange);
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 5px rgba(249, 115, 22, 0.5);
    }

    .node-box.doubly::after {
      content: '';
      position: absolute;
      right: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background: var(--orange);
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 0 5px rgba(249, 115, 22, 0.5);
    }

    .node-box:hover { transform: scale(1.1); }

    .node-box.highlight { animation: highlightPulse 0.6s ease-in-out; }
    @keyframes highlightPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.25); box-shadow: 0 0 35px rgba(139, 92, 246, 0.7); }
    }

    .node-box.deleting { animation: nodeDelete 0.4s ease-in forwards; }
    @keyframes nodeDelete {
      to { opacity: 0; transform: scale(0) rotate(180deg); }
    }

    .node-box.searching { animation: searchGlow 0.8s ease-in-out; }
    @keyframes searchGlow {
      0%, 100% { box-shadow: 0 3px 12px rgba(139, 92, 246, 0.35); }
      50% { box-shadow: 0 0 45px rgba(249, 115, 22, 0.8); }
    }

    .node-box.found {
      background: linear-gradient(135deg, var(--green) 0%, #16A34A 100%) !important;
      box-shadow: 0 0 35px rgba(34, 197, 94, 0.6);
    }

    .pointer {
      width: 40px;
      height: 2px;
      background: var(--primary);
      position: relative;
      display: flex;
      align-items: center;
    }

    .pointer::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-left-color: var(--primary);
    }

    .pointer.doubly {
      background: linear-gradient(90deg, var(--orange), var(--primary));
    }
    .pointer.doubly::after { border-left-color: var(--orange); }

    .pointer.circular {
      width: 35px;
      background: linear-gradient(90deg, var(--green), #16A34A);
      height: 3px;
      border-radius: 0;
    }
    .pointer.circular::after {
      right: -10px;
      top: 50%;
      border-width: 8px;
      border-left-color: var(--green);
      border-top-color: transparent;
      border-bottom-color: transparent;
      border-right-color: transparent;
      transform: translateY(-50%);
    }
    
    /* 环形连接线样式 - 环形链表闭环提示 */
    .circular-loop-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: var(--green-bg);
      border-radius: 6px;
      color: var(--green);
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .circular-loop-indicator::before {
      content: '↻';
      font-size: 1rem;
    }
    
    /* 环形链表指向哨兵的节点样式 */
    .node-box.circular-to-head {
      opacity: 0.5;
      background: linear-gradient(135deg, var(--green) 0%, #16A34A 100%) !important;
      box-shadow: none !important;
      cursor: default;
      font-size: 0.65rem !important;
      color: white;
    }

    .null-box {
      width: 50px;
      height: 44px;
      border: 2px dashed var(--gray);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray);
      font-size: 0.7rem;
      font-weight: 600;
    }

    .chain-description {
      font-size: 0.8rem;
      color: var(--gray);
      text-align: center;
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.7);
      border-radius: 8px;
    }

    .prev-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      margin-top: 4px;
    }

    .label-tag {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .label-tag.prev { background: var(--orange-bg); color: var(--orange); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 250px;
      color: var(--gray);
    }
    .empty-state-icon { font-size: 4rem; margin-bottom: 14px; opacity: 0.5; }
    .empty-state-text { font-size: 1rem; }

    .status-bar {
      margin-top: 16px;
      padding: 12px;
      background: var(--gray-bg);
      border-radius: 10px;
      font-size: 0.85rem;
      color: var(--gray);
      text-align: center;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    .status-bar.success { background: var(--green-bg); color: var(--green); font-weight: 600; }
    .status-bar.error { background: var(--red-bg); color: var(--red); font-weight: 600; }

    /* 代码展示区 */
    .code-area {
      background: var(--white);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .code-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .code-header::before {
      content: '';
      width: 4px;
      height: 18px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 2px;
    }

    .code-header h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #1F2937;
    }

    .code-content {
      background: #1E293B;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      overflow-x: auto;
      max-height: 200px;
    }

    .code-content pre {
      margin: 0;
      color: #E2E8F0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .code-keyword { color: #C792EA; }
    .code-function { color: #82AAFF; }
    .code-string { color: #C3E88D; }
    .code-number { color: #F78C6C; }
    .code-comment { color: #697098; font-style: italic; }
    .code-type { color: #FFCB6B; }

    /* 右侧控制面板 */
    .control-panel {
      background: var(--white);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow);
      height: fit-content;
    }

    .control-section {
      margin-bottom: 20px;
    }
    .control-section:last-child { margin-bottom: 0; }

    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 3px;
      height: 16px;
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 2px;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      justify-content: center;
      min-width: 90px;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: 0 3px 12px rgba(139, 92, 246, 0.4);
    }
    .btn-orange {
      background: linear-gradient(135deg, var(--orange) 0%, #EA580C 100%);
      color: white;
      box-shadow: 0 3px 12px rgba(249, 115, 22, 0.4);
    }
    .btn-green {
      background: linear-gradient(135deg, var(--green) 0%, #16A34A 100%);
      color: white;
      box-shadow: 0 3px 12px rgba(34, 197, 94, 0.4);
    }
    .btn-red {
      background: linear-gradient(135deg, var(--red) 0%, #DC2626 100%);
      color: white;
      box-shadow: 0 3px 12px rgba(239, 68, 68, 0.4);
    }
    .btn-gray {
      background: var(--gray-bg);
      color: var(--gray);
      flex: none;
      min-width: auto;
    }
    .btn-gray:hover { background: #E5E7EB; }

    .chain-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .chain-btn {
      padding: 12px 8px;
      border: none;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .chain-btn .icon { font-size: 1.4rem; }

    .chain-btn.singly {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(139, 92, 246, 0.05) 100%);
      color: var(--primary);
      border: 2px solid transparent;
    }
    .chain-btn.singly.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-color: var(--primary);
    }
    .chain-btn.doubly {
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.15) 0%, rgba(249, 115, 22, 0.05) 100%);
      color: var(--orange);
      border: 2px solid transparent;
    }
    .chain-btn.doubly.active {
      background: linear-gradient(135deg, var(--orange) 0%, #EA580C 100%);
      color: white;
      border-color: var(--orange);
    }
    .chain-btn.circular {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(34, 197, 94, 0.05) 100%);
      color: var(--green);
      border: 2px solid transparent;
    }
    .chain-btn.circular.active {
      background: linear-gradient(135deg, var(--green) 0%, #16A34A 100%);
      color: white;
      border-color: var(--green);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
    }

    .input-wrapper label {
      font-size: 0.82rem;
      color: var(--gray);
      font-weight: 500;
      white-space: nowrap;
    }

    input[type="number"], input[type="text"], select {
      padding: 9px 11px;
      border: 2px solid var(--primary-bg);
      border-radius: 10px;
      font-size: 0.88rem;
      transition: all 0.3s ease;
      outline: none;
      flex: 1;
      min-width: 75px;
    }
    input[type="number"]:focus, input[type="text"]:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    .info-display {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .info-card {
      background: linear-gradient(135deg, var(--primary-bg) 0%, rgba(139, 92, 246, 0.05) 100%);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }
    .info-card.orange { background: linear-gradient(135deg, var(--orange-bg) 0%, rgba(249, 115, 22, 0.05) 100%); }
    .info-card.green { background: linear-gradient(135deg, var(--green-bg) 0%, rgba(34, 197, 94, 0.05) 100%); }

    .info-card-label { font-size: 0.7rem; color: var(--gray); margin-bottom: 4px; }
    .info-card-value { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
    .info-card.orange .info-card-value { color: var(--orange); }
    .info-card.green .info-card-value { color: var(--green); }

    /* 模态框 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }

    .modal {
      background: var(--white);
      padding: 26px;
      border-radius: 18px;
      max-width: 420px;
      width: 90%;
      transform: scale(0.9);
      transition: all 0.3s ease;
    }
    .modal-overlay.active .modal { transform: scale(1); }

    .modal-header { font-size: 1.15rem; font-weight: 700; color: #1F2937; margin-bottom: 16px; }
    .modal-body { margin-bottom: 16px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }

    @media (max-width: 1100px) {
      .main-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>链表可视化交互平台</h1>
      <p>单链表 / 双向链表 / 环形链表 - 交互式操作与动画演示</p>
    </header>

    <div class="main-layout">
      <!-- 左侧区域 -->
      <div class="left-area">
        <!-- 可视化区域 -->
        <div class="visualization-area">
          <div class="viz-header">
            <div class="viz-icon singly" id="viz-icon">
              <svg width="24" height="24" fill="white" viewBox="0 0 24 24">
                <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" transform="rotate(90 12 12)"/>
              </svg>
            </div>
            <div>
              <div class="viz-title singly" id="viz-title">单链表</div>
              <div class="viz-subtitle" id="viz-subtitle">每个节点只指向后继节点</div>
            </div>
          </div>

          <div class="viz-content" id="viz-content">
            <div class="empty-state" id="empty-state">
              <div class="empty-state-icon">📋</div>
              <div class="empty-state-text">空链表 - 还未添加节点</div>
            </div>
          </div>

          <div class="status-bar" id="status-bar">状态: 就绪</div>
        </div>

        <!-- 代码展示区 -->
        <div class="code-area">
          <div class="code-header">
            <h3>核心代码</h3>
          </div>
          <div class="code-content">
            <pre id="code-display"><span class="code-comment">// 选择操作查看对应代码</span></pre>
          </div>
        </div>
      </div>

      <!-- 右侧控制面板 -->
      <div class="control-panel">
        <div class="control-section">
          <div class="section-title">操作目标</div>
          <div class="chain-selector">
            <button class="chain-btn singly active" onclick="selectChain('singly')" id="chain-btn-singly">
              <span class="icon">📌</span>
              <span>单链表</span>
            </button>
            <button class="chain-btn doubly" onclick="selectChain('doubly')" id="chain-btn-doubly">
              <span class="icon">🔗</span>
              <span>双链表</span>
            </button>
            <button class="chain-btn circular" onclick="selectChain('circular')" id="chain-btn-circular">
              <span class="icon">🔄</span>
              <span>环形链表</span>
            </button>
          </div>
        </div>

        <div class="control-section">
          <div class="section-title">增删改查</div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="showModal('add')">
              <span>➕</span> 增加
            </button>
            <button class="btn btn-orange" onclick="showModal('delete')">
              <span>➖</span> 删除
            </button>
            <button class="btn btn-green" onclick="showModal('update')">
              <span>✏️</span> 修改
            </button>
            <button class="btn btn-primary" onclick="showModal('search')">
              <span>🔍</span> 查找
            </button>
          </div>
        </div>

        <div class="control-section">
          <div class="section-title">遍历与长度</div>
          <div class="button-group">
            <button class="btn btn-primary" onclick="traverse()">
              <span>🚶</span> 遍历
            </button>

  <!-- 模态框 -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">

        <button class="btn btn-primary" id="modal-confirm" onclick="confirmModal()">确认</button>

  </div>

  <script>
    // 代码库
    const codeLibrary = {
      addHead: `<span class="code-comment">// 在头部添加节点</span>
<span class="code-keyword">function</span> <span class="code-function">addAtHead</span>(value) {
  <span class="code-keyword">const</span> newNode = <span class="code-keyword">new</span> <span class="code-type">ListNode</span>(value);
  <span class="code-keyword">if</span> (!<span class="code-keyword">this</span>.head) {
    <span class="code-keyword">this</span>.head = newNode;
    <span class="code-keyword">this</span>.tail = newNode;
  } <span class="code-keyword">else</span> {
    newNode.next = <span class="code-keyword">this</span>.head;
    <span class="code-keyword">this</span>.head = newNode;
  }
  <span class="code-keyword">this</span>.length++;
}`,

      addTail: `<span class="code-comment">// 在尾部添加节点</span>
<span class="code-keyword">function</span> <span class="code-function">addAtTail</span>(value) {
  <span class="code-keyword">const</span> newNode = <span class="code-keyword">new</span> <span class="code-type">ListNode</span>(value);
  <span class="code-keyword">if</span> (!<span class="code-keyword">this</span>.tail) {
    <span class="code-keyword">this</span>.head = newNode;
    <span class="code-keyword">this</span>.tail = newNode;
  } <span class="code-keyword">else</span> {
    <span class="code-keyword">this</span>.tail.next = newNode;
    <span class="code-keyword">this</span>.tail = newNode;
  }
  <span class="code-keyword">this</span>.length++;
}`,

      deleteHead: `<span class="code-comment">// 删除头部节点</span>
<span class="code-keyword">function</span> <span class="code-function">deleteAtHead</span>() {
  <span class="code-keyword">if</span> (!<span class="code-keyword">this</span>.head) <span class="code-keyword">return null</span>;
  <span class="code-keyword">const</span> value = <span class="code-keyword">this</span>.head.value;
  <span class="code-keyword">this</span>.head = <span class="code-keyword">this</span>.head.next;
  <span class="code-keyword">this</span>.length--;
  <span class="code-keyword">return</span> value;
}`,

      deleteTail: `<span class="code-comment">// 删除尾部节点</span>
<span class="code-keyword">function</span> <span class="code-function">deleteAtTail</span>() {
  <span class="code-keyword">if</span> (!<span class="code-keyword">this</span>.tail) <span class="code-keyword">return null</span>;
  <span class="code-keyword">const</span> value = <span class="code-keyword">this</span>.tail.value;
  <span class="code-keyword">let</span> current = <span class="code-keyword">this</span>.head;
  <span class="code-keyword">while</span> (current.next !== <span class="code-keyword">this</span>.tail) {
    current = current.next;
  }
  current.next = <span class="code-keyword">null</span>;
  <span class="code-keyword">this</span>.tail = current;
  <span class="code-keyword">this</span>.length--;
  <span class="code-keyword">return</span> value;
}`,

      search: `<span class="code-comment">// 查找节点</span>
<span class="code-keyword">function</span> <span class="code-function">search</span>(value) {
  <span class="code-keyword">let</span> current = <span class="code-keyword">this</span>.head;
  <span class="code-keyword">let</span> index = <span class="code-number">0</span>;
  <span class="code-keyword">while</span> (current) {
    <span class="code-keyword">if</span> (current.value === value) {
      <span class="code-keyword">return</span> index;
    }
    current = current.next;
    index++;
  }
  <span class="code-keyword">return</span> -<span class="code-number">1</span>;
}`,

      reverse: `<span class="code-comment">// 翻转链表</span>
<span class="code-keyword">function</span> <span class="code-function">reverse</span>() {
  <span class="code-keyword">let</span> prev = <span class="code-keyword">null</span>;
  <span class="code-keyword">let</span> current = <span class="code-keyword">this</span>.head;
  <span class="code-keyword">while</span> (current) {
    <span class="code-keyword">const</span> next = current.next;
    current.next = prev;
    prev = current;
    current = next;
  }
  <span class="code-keyword">this</span>.head = prev;
}`,

      detectCycle: `<span class="code-comment">// 检测环 (Floyd算法)</span>
<span class="code-keyword">function</span> <span class="code-function">detectCycle</span>() {
  <span class="code-keyword">let</span> slow = <span class="code-keyword">this</span>.head;
  <span class="code-keyword">let</span> fast = <span class="code-keyword">this</span>.head;
  <span class="code-keyword">while</span> (fast && fast.next) {
    slow = slow.next;
    fast = fast.next.next;
    <span class="code-keyword">if</span> (slow === fast) {
      <span class="code-keyword">return true</span>;
    }
  }
  <span class="code-keyword">return false</span>;
}`,

      traverse: `<span class="code-comment">// 遍历链表</span>
<span class="code-keyword">function</span> <span class="code-function">traverse</span>() {
  <span class="code-keyword">const</span> result = [];
  <span class="code-keyword">let</span> current = <span class="code-keyword">this</span>.head;
  <span class="code-keyword">while</span> (current) {
    result.push(current.value);
    current = current.next;
  }
  <span class="code-keyword">return</span> result;
}`,

      sort: `<span class="code-comment">// 链表排序</span>
<span class="code-keyword">function</span> <span class="code-function">sort</span>() {
  <span class="code-keyword">const</span> arr = <span class="code-keyword">this</span>.traverse();
  arr.sort((a, b) => a - b);
  <span class="code-keyword">this</span>.head = <span class="code-keyword">null</span>;
  <span class="code-keyword">this</span>.tail = <span class="code-keyword">null</span>;
  arr.forEach(v => <span class="code-keyword">this</span>.addAtTail(v));
}`,

      merge: `<span class="code-comment">// 合并两个链表</span>
<span class="code-keyword">function</span> <span class="code-function">merge</span>(list) {
  <span class="code-keyword">let</span> current = list.head;
  <span class="code-keyword">while</span> (current) {
    <span class="code-keyword">this</span>.addAtTail(current.value);
    current = current.next;
  }
}`
    };

    // 显示代码
    function showCode(codeKey) {
      document.getElementById('code-display').innerHTML = codeLibrary[codeKey] || codeLibrary.traverse;
    }

    // 链表类定义
    class ListNode {
      constructor(value) {
        this.value = value;
        this.next = null;
        this.prev = null;
      }
    }

    class LinkedList {
      constructor(type) {
        this.head = null;
        this.tail = null;
        this.length = 0;
        this.type = type;
      }

      addAtHead(value) {
        const newNode = new ListNode(value);
        if (!this.head) {
          this.head = newNode;
          this.tail = newNode;
          if (this.type === 'circular') {
            this.head.next = this.head;
            this.head.prev = this.head;
          }
        } else {
          newNode.next = this.head;
          if (this.type === 'doubly' || this.type === 'circular') {
            newNode.prev = this.tail;
            this.head.prev = newNode;
          }
          this.head = newNode;
          if (this.type === 'circular') {
            this.tail.next = this.head;
            this.head.prev = this.tail;
          }
        }
        this.length++;
      }

      addAtTail(value) {
        const newNode = new ListNode(value);
        if (!this.tail) {
          this.head = newNode;
          this.tail = newNode;
          if (this.type === 'circular') {
            this.head.next = this.head;
            this.head.prev = this.head;
          }
        } else {
          this.tail.next = newNode;
          if (this.type === 'doubly' || this.type === 'circular') {
            newNode.prev = this.tail;
          }
          this.tail = newNode;
          if (this.type === 'circular') {
            this.tail.next = this.head;
            this.head.prev = this.tail;
          }
        }
        this.length++;
      }

      addAtIndex(value, index) {
        if (index < 0 || index > this.length) return false;
        if (index === 0) { this.addAtHead(value); return true; }
        if (index === this.length) { this.addAtTail(value); return true; }
        const newNode = new ListNode(value);
        let current = this.head;
        for (let i = 0; i < index - 1; i++) {
          current = current.next;
        }
        newNode.next = current.next;
        if (this.type === 'doubly' || this.type === 'circular') {
          newNode.prev = current;
          if (current.next) current.next.prev = newNode;
        }
        current.next = newNode;
        this.length++;
        return true;
      }

      deleteAtHead() {
        if (!this.head) return null;
        const value = this.head.value;
        if (this.head === this.tail) {
          this.head = null;
          this.tail = null;
        } else {
          this.head = this.head.next;
          if (this.type === 'doubly' || this.type === 'circular') {
            this.head.prev = this.tail;
          }
          if (this.type === 'circular') {
            this.tail.next = this.head;
          }
        }
        this.length--;
        return value;
      }

      deleteAtTail() {
        if (!this.tail) return null;
        const value = this.tail.value;
        if (this.head === this.tail) {
          this.head = null;
          this.tail = null;
        } else {
          let current = this.head;
          while (current.next !== this.tail) {
            current = current.next;
          }
          current.next = null;
          if (this.type === 'doubly' || this.type === 'circular') {
            this.tail = current;
            this.tail.next = this.type === 'circular' ? this.head : null;
            if (this.head) this.head.prev = this.tail;
          } else {
            this.tail = current;
          }
        }
        this.length--;
        return value;
      }

      deleteAtIndex(index) {
        if (index < 0 || index >= this.length || !this.head) return null;
        if (index === 0) return this.deleteAtHead();
        if (index === this.length - 1) return this.deleteAtTail();
        
        let current = this.head;
        for (let i = 0; i < index - 1; i++) {
          current = current.next;
        }
        const value = current.next.value;
        current.next = current.next.next;
        if (this.type === 'doubly' || this.type === 'circular') {
          if (current.next) current.next.prev = current;
        }
        this.length--;
        return value;
      }

      updateAtIndex(value, index) {
        if (index < 0 || index >= this.length || !this.head) return false;
        let current = this.head;
        for (let i = 0; i < index; i++) {
          current = current.next;
        }
        current.value = value;
        return true;
      }

      search(value) {
        let current = this.head;
        let index = 0;
        while (current) {
          if (current.value === value) return index;
          current = current.next;
          index++;
          if (this.type !== 'circular' && !current) break;
          if (this.type === 'circular' && current === this.head) break;
        }
        return -1;
      }

      traverse() {
        const result = [];
        let current = this.head;
        while (current) {
          result.push(current.value);
          current = current.next;
          if (this.type !== 'circular' && !current) break;
          if (this.type === 'circular' && current === this.head) break;
        }
        return result;
      }

      reverse() {
        if (!this.head || !this.head.next) return;
        let prev = null;
        let current = this.head;
        this.tail = this.head;
        
        while (current) {
          const next = current.next;
          current.next = prev;
          if (this.type === 'doubly' || this.type === 'circular') {
            current.prev = next;
          }
          prev = current;
          current = next;
        }
        
        this.head = prev;
        if (this.type === 'circular') {
          this.tail.next = this.head;
          this.head.prev = this.tail;
        }
      }

      sort() {
        if (!this.head || !this.head.next) return;
        const arr = this.traverse();
        arr.sort((a, b) => a - b);
        
        this.head = null;
        this.tail = null;
        arr.forEach(v => this.addAtTail(v));
      }

      detectCycle() {
        if (!this.head) return false;
        let slow = this.head;
        let fast = this.head;
        
        while (fast && fast.next) {
          slow = slow.next;
          fast = fast.next.next;
          if (slow === fast) return true;
        }
        return false;
      }

      clone() {
        const newList = new LinkedList(this.type);
        let current = this.head;
        while (current) {
          newList.addAtTail(current.value);
          current = current.next;
          if (this.type !== 'circular' && !current) break;
          if (this.type === 'circular' && current === this.head) break;
        }
        return newList;
      }

      clear() {
        this.head = null;
        this.tail = null;
        this.length = 0;
      }

      getLength() {
        return this.length;
      }
    }

    // 全局链表实例
    const lists = {
      singly: new LinkedList('singly'),
      doubly: new LinkedList('doubly'),
      circular: new LinkedList('circular')
    };

    let currentChain = 'singly';
    let currentModalAction = '';

    // 初始化
    function init() {
      [5, 3, 8, 1, 9].forEach(v => {
        lists.singly.addAtTail(v);
        lists.doubly.addAtTail(v);
        lists.circular.addAtTail(v);
      });
      renderChain();
      updateLengths();
      showCode('traverse');
    }

    // 更新可视化区域样式
    function updateVizStyle(type) {
      const icon = document.getElementById('viz-icon');
      const title = document.getElementById('viz-title');
      const subtitle = document.getElementById('viz-subtitle');
      const content = document.getElementById('viz-content');
      
      icon.className = `viz-icon ${type}`;
      
      const titles = { singly: '单链表', doubly: '双向链表', circular: '环形链表' };
      const subs = { singly: '每个节点只指向后继节点', doubly: '节点同时指向前后节点', circular: '尾节点指向头节点形成环' };
      const icons = {
        singly: '<svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" transform="rotate(90 12 12)"/></svg>',
        doubly: '<svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>',
        circular: '<svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" transform="rotate(-45 12 12)"/></svg>'
      };
      
      title.textContent = titles[type];
      title.className = `viz-title ${type}`;
      subtitle.textContent = subs[type];
      icon.innerHTML = icons[type];
      content.className = `viz-content ${type}-bg`;
    }

    // 渲染链表
    function renderChain() {
      const container = document.getElementById('viz-content');
      const list = lists[currentChain];
      const maxPerRow = 6;
      
      if (!list.head && list.length === 0) {
        // 空链表只显示哨兵节点
        let html = '<div class="chain-row">';
        if (currentChain === 'circular') {
          // 环形链表空状态：哨兵节点自环
          html += '<div class="sentinel-box">HEAD</div>';
          html += '<div class="pointer circular" style="width:35px;"></div>';
          html += `<div class="node-box circular-to-head" style="opacity:0.3;">↻</div>`;
          html += '<div style="color:var(--green);font-size:0.75rem;margin-left:8px;">自环</div>';
        } else {
          html += '<div class="sentinel-box">HEAD</div>';
          html += '<div class="pointer"></div>';
          html += '<div class="null-box">NULL</div>';
        }
        html += '</div>';
        
        if (currentChain === 'doubly') {
          html += '<div class="prev-row"><span class="label-tag prev">prev</span><div class="null-box">NULL</div></div>';
        }
        html += '<div class="chain-description">哨兵节点 (head pointer)</div>';
        container.innerHTML = html;
        return;
      }

      // 收集所有节点值
      let current = list.head;
      const nodes = [];
      const maxNodes = 20;
      while (current && nodes.length < maxNodes) {
        nodes.push(current.value);
        current = current.next;
        if (currentChain !== 'circular' && !current) break;
        if (currentChain === 'circular' && current === list.head) break;
      }

      let html = '';
      
      // 分行显示，每行最多6个节点
      for (let row = 0; row < Math.ceil(nodes.length / maxPerRow); row++) {
        const startIdx = row * maxPerRow;
        const endIdx = Math.min(startIdx + maxPerRow, nodes.length);
        const rowNodes = nodes.slice(startIdx, endIdx);
        
        html += `<div class="chain-row">`;
        
        // 每行的头显示行号和哨兵
        if (row === 0) {
          // 环形链表：哨兵节点指向第一个节点
          if (currentChain === 'circular') {
            html += '<div class="sentinel-box">HEAD</div>';
            html += '<div class="pointer circular" style="width:35px;"></div>';
            html += `<div class="node-box circular-to-head">→</div>`;
          } else {
            html += '<div class="sentinel-box">HEAD</div>';
            html += '<div class="pointer"></div>';
          }
        } else {
          html += '<div style="width:50px"></div>';
          html += '<div style="width:40px"></div>';
        }
        
        rowNodes.forEach((val, i) => {
          const globalIdx = startIdx + i;
          const isLastInRow = i === rowNodes.length - 1;
          const isLastNode = globalIdx === nodes.length - 1;
          const isDoubly = currentChain === 'doubly';
          
          html += `<div class="node" data-value="${val}" data-index="${globalIdx}">`;
          
          // 双向链表：左侧显示指向前一个节点的箭头
          if (isDoubly && row === 0 && i === 0) {
            // 第一个节点，左侧是NULL
            html += `<div class="null-box" style="width:35px;height:48px;font-size:0.6rem;">NULL</div>`;
          } else if (isDoubly) {
            html += `<div class="pointer doubly" style="width:30px;"></div>`;
          }
          
          html += `<div class="node-box ${currentChain}">${val}</div>`;
          
          // 判断右侧指针
          if (isLastInRow && !isLastNode) {
            // 换行指针
            html += `<div style="font-size:1.2rem;margin-left:5px;">↴</div>`;
          } else if (isLastNode) {
            if (currentChain === 'circular') {
              // 环形链表：最后一个节点指向哨兵
              html += `<div class="pointer circular" style="width:35px;"></div>`;
              html += `<div class="sentinel-box" style="font-size:0.65rem;">HEAD</div>`;
            } else {
              html += `<div class="pointer ${isDoubly ? 'doubly' : ''}"></div>`;
              html += `<div class="null-box">NULL</div>`;
            }
          } else {
            html += `<div class="pointer ${isDoubly ? 'doubly' : ''}"></div>`;
          }
          html += '</div>';
        });
        
        // 如果是最后一行但还有更多节点
        if (row === Math.ceil(nodes.length / maxPerRow) - 1 && currentChain === 'circular' && list.length > maxNodes) {
          html += '<div style="color:var(--gray);font-size:0.8rem;">...</div>';
        }
        
        html += '</div>';
      }

      const descMap = {
        singly: '➡️ 单向指针，只能前向遍历',
        doubly: '🔗 双向指针，可前后遍历',
        circular: '🔄 哨兵HEAD指向首节点，尾节点指向HEAD形成闭环'
      };
      html += `<div class="chain-description">${descMap[currentChain]} | 节点数: ${list.length}</div>`;

      container.innerHTML = html;
    }

    // 更新长度显示
    function updateLengths() {
      Object.keys(lists).forEach(type => {
        document.getElementById(`${type}-length`).textContent = lists[type].getLength();
      });
    }

    // 更新状态栏
    function updateStatus(message, type = '') {
      const statusBar = document.getElementById('status-bar');
      statusBar.textContent = message;
      statusBar.className = 'status-bar ' + type;
    }

    // 选择链表类型
    function selectChain(type) {
      currentChain = type;
      
      document.querySelectorAll('.chain-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById(`chain-btn-${type}`).classList.add('active');
      
      const names = { singly: '单链表', doubly: '双链表', circular: '环形链表' };
      document.getElementById('current-chain-name').textContent = names[type];
      
      updateVizStyle(type);
      renderChain();
      showCode('traverse');
    }

    // 模态框操作
    function showModal(action) {
      currentModalAction = action;
      const overlay = document.getElementById('modal-overlay');
      const title = document.getElementById('modal-title');
      const body = document.getElementById('modal-body');
      const confirmBtn = document.getElementById('modal-confirm');

      const chainNames = { singly: '单链表', doubly: '双向链表', circular: '环形链表' };
      const typeName = chainNames[currentChain];

      switch (action) {
        case 'add':
          title.textContent = `向 ${typeName} 添加节点`;
          showCode('addTail');
          body.innerHTML = `
            <div class="input-group">
              <div class="input-wrapper">
                <label>数值:</label>
                <input type="number" id="add-value" placeholder="输入值" min="1" max="999">
              </div>
            </div>
            <div class="input-group">
              <div class="input-wrapper">
                <label>位置:</label>
                <select id="add-position" style="flex:1">
                  <option value="head">头部</option>
                  <option value="tail" selected>尾部</option>
                  <option value="index">指定位置</option>
                </select>
              </div>
              <div class="input-wrapper" id="index-wrapper" style="display: none; flex:1">
                <label>索引:</label>
                <input type="number" id="add-index" placeholder="位置" min="0">
              </div>
            </div>
          `;
          document.getElementById('add-position').onchange = function() {
            document.getElementById('index-wrapper').style.display = 
              this.value === 'index' ? 'flex' : 'none';
            showCode(this.value === 'head' ? 'addHead' : 'addTail');
          };
          confirmBtn.className = 'btn btn-primary';
          break;

        case 'delete':
          title.textContent = `从 ${typeName} 删除节点`;
          showCode('deleteHead');
          const listDel = lists[currentChain];
          if (listDel.getLength() === 0) {
            body.innerHTML = '<p style="color: var(--red);">链表为空，无法删除</p>';
            confirmBtn.style.display = 'none';
          } else {
            body.innerHTML = `
              <div class="input-group">
                <div class="input-wrapper">
                  <label>位置:</label>
                  <select id="delete-position" style="flex:1">
                    <option value="head">头部</option>
                    <option value="tail">尾部</option>
                    ${currentChain !== 'circular' ? '<option value="index">指定位置</option>' : ''}
                  </select>
                </div>
                <div class="input-wrapper" id="del-index-wrapper" style="display: none; flex:1">
                  <label>索引:</label>
                  <input type="number" id="delete-index" placeholder="位置" min="0" max="${listDel.getLength() - 1}">
                </div>
              </div>
              <p style="margin-top: 10px; color: var(--gray); font-size: 0.85rem;">
                当前长度: ${listDel.getLength()}
              </p>
            `;
            document.getElementById('delete-position').onchange = function() {
              document.getElementById('del-index-wrapper').style.display = 
                this.value === 'index' ? 'flex' : 'none';
              showCode(this.value === 'head' ? 'deleteHead' : 'deleteTail');
            };
            confirmBtn.style.display = 'block';
            confirmBtn.className = 'btn btn-orange';
          }
          break;

        case 'update':
          title.textContent = `修改 ${typeName} 节点`;
          const listUpd = lists[currentChain];
          if (listUpd.getLength() === 0) {
            body.innerHTML = '<p style="color: var(--red);">链表为空，无法修改</p>';
            confirmBtn.style.display = 'none';
          } else {
            body.innerHTML = `
              <div class="input-group">
                <div class="input-wrapper">
                  <label>索引:</label>
                  <input type="number" id="update-index" placeholder="位置" min="0" max="${listUpd.getLength() - 1}">
                </div>
                <div class="input-wrapper">
                  <label>新值:</label>
                  <input type="number" id="update-value" placeholder="新值">
                </div>
              </div>
              <p style="margin-top: 10px; color: var(--gray); font-size: 0.85rem;">
                当前值: [${listUpd.traverse().join(', ')}]
              </p>
            `;
            confirmBtn.style.display = 'block';
            confirmBtn.className = 'btn btn-green';
          }
          break;

        case 'search':
          title.textContent = `在 ${typeName} 中查找`;
          showCode('search');
          body.innerHTML = `
            <div class="input-group">
              <div class="input-wrapper">
                <label>查找值:</label>
                <input type="number" id="search-value" placeholder="输入要查找的值">
              </div>
            </div>
            <p style="margin-top: 10px; color: var(--gray); font-size: 0.85rem;">
              将高亮显示找到的节点位置
            </p>
          `;
          confirmBtn.className = 'btn btn-primary';
          break;

        case 'merge':
          title.textContent = '合并链表';
          showCode('merge');
          const otherChains = Object.keys(lists).filter(k => k !== currentChain);
          const otherName = chainNames[otherChains[0]];
          body.innerHTML = `
            <p style="margin-bottom: 10px; color: var(--gray);">将 ${otherName} 合并到当前 ${typeName}</p>
            <div class="input-group">
              <div class="input-wrapper">
                <label>合并方式:</label>
                <select id="merge-mode" style="flex:1">
                  <option value="append">追加到尾部</option>
                  <option value="prepend">添加到头部</option>
                </select>
              </div>
            </div>
            <p style="margin-top: 10px; color: var(--gray); font-size: 0.82rem;">
              ${typeName}: [${lists[currentChain].traverse().join(', ')}]<br>
              ${otherName}: [${lists[otherChains[0]].traverse().join(', ')}]
            </p>
          `;
          confirmBtn.className = 'btn btn-green';
          break;
      }

      overlay.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      document.getElementById('modal-confirm').style.display = 'block';
    }

    function closeModalOnOverlay(e) {
      if (e.target === e.currentTarget) closeModal();
    }

    // 动画效果 - 添加节点
    async function animateAddNode(value) {
      updateStatus(`正在添加节点: ${value}...`);
      await new Promise(r => setTimeout(r, 300));
      renderChain();
      // 新增节点高亮闪烁
      const container = document.getElementById('viz-content');
      const nodeBoxes = container.querySelectorAll('.node-box');
      if (nodeBoxes.length > 0) {
        const lastNode = nodeBoxes[nodeBoxes.length - 1];
        lastNode.classList.add('highlight');
        await new Promise(r => setTimeout(r, 400));
        lastNode.classList.remove('highlight');
      }
      updateLengths();
      updateStatus(`已添加节点: ${value}`, 'success');
      setTimeout(() => updateStatus('状态: 就绪'), 1500);
    }

    // 动画效果 - 删除节点
    async function animateDeleteNode(position, value) {
      const container = document.getElementById('viz-content');
      const nodes = container.querySelectorAll('.node-box');
      
      updateStatus(`正在删除节点: ${value}...`);
      
      if (nodes.length > 0) {
        const targetIdx = position === 'head' ? 0 : nodes.length - 1;
        const targetNode = nodes[targetIdx];
        targetNode.classList.add('deleting');
        await new Promise(r => setTimeout(r, 400));
      }
      
      renderChain();
      updateLengths();
      updateStatus(`已删除节点: ${value}`, 'success');
      setTimeout(() => updateStatus('状态: 就绪'), 1500);
    }

    // 动画效果 - 查找节点
    async function animateSearchNode(targetValue) {
      const list = lists[currentChain];
      const values = list.traverse();
      
      if (values.length === 0) {
        updateStatus('链表为空', 'error');
        return;
      }
      
      updateStatus(`正在查找值: ${targetValue}...`);
      
      const container = document.getElementById('viz-content');
      const nodeElements = container.querySelectorAll('.node');
      
      for (let i = 0; i < nodeElements.length && i < values.length; i++) {
        const nodeBox = nodeElements[i].querySelector('.node-box');
        nodeBox.classList.add('searching');
        await new Promise(r => setTimeout(r, 350));
        
        if (values[i] === targetValue) {
          nodeBox.classList.remove('searching');
          nodeBox.classList.add('found');
          updateStatus(`找到值 ${targetValue}！位于索引 ${i}`, 'success');
          await new Promise(r => setTimeout(r, 1000));
          nodeBox.classList.remove('found');
          return;
        }
        
        nodeBox.classList.remove('searching');
      }
      
      updateStatus(`未找到值 ${targetValue}`, 'error');
      setTimeout(() => updateStatus('状态: 就绪'), 1500);
    }

    // 动画效果 - 遍历
    async function animateTraverse() {
      const list = lists[currentChain];
      if (list.getLength() === 0) {
        updateStatus('链表为空，无法遍历', 'error');
        return;
      }

      const values = list.traverse();
      updateStatus(`遍历中...`);

      const container = document.getElementById('viz-content');
      const nodes = container.querySelectorAll('.node-box');
      
      for (let i = 0; i < nodes.length; i++) {
        nodes[i].classList.add('highlight');
        await new Promise(r => setTimeout(r, 350));
        if (i < nodes.length - 1) {
          nodes[i].classList.remove('highlight');
        }
      }
      
      await new Promise(r => setTimeout(r, 300));
      updateStatus(`遍历完成: [${values.join(' → ')}]`, 'success');
      renderChain();
      setTimeout(() => updateStatus('状态: 就绪'), 1500);
    }

    // 动画效果 - 翻转
    async function animateReverse() {
      const list = lists[currentChain];
      if (list.getLength() <= 1) {
        updateStatus('节点数不足，无法翻转', 'error');
        return;
      }

      updateStatus('正在翻转链表...');
      
      const container = document.getElementById('viz-content');
      const nodes = container.querySelectorAll('.node-box');
      
      // 所有节点闪烁
      nodes.forEach(n => n.classList.add('highlight'));
      await new Promise(r => setTimeout(r, 500));
      
      list.reverse();
      renderChain();
      
      // 翻转后再次闪烁
      const newNodes = document.querySelectorAll('.node-box');
      newNodes.forEach((n, i) => {
        setTimeout(() => n.classList.add('found'), i * 80);
        setTimeout(() => n.classList.remove('found'), i * 80 + 300);
      });
      
      await new Promise(r => setTimeout(r, newNodes.length * 80 + 400));
      updateStatus('翻转成功!', 'success');
      setTimeout(() => updateStatus('状态: 就绪'), 1500);
    }

    // 动画效果 - 排序
    async function animateSort() {
      const list = lists[currentChain];
      if (list.getLength() <= 1) {
        updateStatus('节点数不足，无需排序', 'error');
        return;
      }

      updateStatus('正在排序...');
      
      const container = document.getElementById('viz-content');
      const nodes = container.querySelectorAll('.node-box');
      
      // 所有节点闪烁
      nodes.forEach(n => n.classList.add('highlight'));
      await new Promise(r => setTimeout(r, 600));
      
      list.sort();
      renderChain();
      
      // 排序后逐个高亮
      const newNodes = document.querySelectorAll('.node-box');
      newNodes.forEach((n, i) => {
        setTimeout(() => {
          n.classList.add('found');
          setTimeout(() => n.classList.remove('found'), 300);
        }, i * 100);
      });
      
      await new Promise(r => setTimeout(r, newNodes.length * 100 + 500));
      updateStatus('排序完成!', 'success');
      setTimeout(() => updateStatus('状态: 就绪'), 1500);
    }

    // 动画效果 - 合并
    async function animateMerge() {
      updateStatus('正在合并链表...');
      
      const container = document.getElementById('viz-content');
      const nodes = container.querySelectorAll('.node-box');
      
      nodes.forEach(n => n.classList.add('highlight'));
      await new Promise(r => setTimeout(r, 400));
      nodes.forEach(n => n.classList.remove('highlight'));
      
      await new Promise(r => setTimeout(r, 200));
      renderChain();
      updateLengths();
      updateStatus('合并成功!', 'success');
      setTimeout(() => updateStatus('状态: 就绪'), 1500);
    }

    // 确认模态框操作
    async function confirmModal() {
      const action = currentModalAction;
      const list = lists[currentChain];

      switch (action) {
        case 'add': {
          const value = parseInt(document.getElementById('add-value').value);
          const position = document.getElementById('add-position').value;
          if (isNaN(value)) {
            alert('请输入有效的数值');
            return;
          }
          
          if (position === 'head') {
            list.addAtHead(value);
          } else if (position === 'tail') {
            list.addAtTail(value);
          } else {
            const index = parseInt(document.getElementById('add-index').value);
            if (isNaN(index)) {
              alert('请输入有效的位置');
              return;
            }
            list.addAtIndex(value, index);
          }
          closeModal();
          await animateAddNode(value);
          break;
        }

        case 'delete': {
          const position = document.getElementById('delete-position').value;
          let value;
          
          if (position === 'index') {
            const index = parseInt(document.getElementById('delete-index').value);
            if (isNaN(index)) {
              alert('请输入有效的位置');
              return;
            }
            value = list.deleteAtIndex(index);
          } else if (position === 'head') {
            value = list.deleteAtHead();
          } else {
            value = list.deleteAtTail();
          }
          
          if (value !== null) {
            closeModal();
            await animateDeleteNode(position, value);
          }
          break;
        }

        case 'update': {
          const index = parseInt(document.getElementById('update-index').value);
          const value = parseInt(document.getElementById('update-value').value);
          if (isNaN(index) || isNaN(value)) {
            alert('请输入有效的索引和新值');
            return;
          }
          
          closeModal();
          if (list.updateAtIndex(value, index)) {
            renderChain();
            updateStatus(`已将索引 ${index} 的值修改为 ${value}`, 'success');
          } else {
            updateStatus('修改失败: 索引无效', 'error');
          }
          setTimeout(() => updateStatus('状态: 就绪'), 1500);
          break;
        }

        case 'search': {
          const value = parseInt(document.getElementById('search-value').value);
          if (isNaN(value)) {
            alert('请输入要查找的值');
            return;
          }
          
          closeModal();
          await animateSearchNode(value);
          break;
        }

        case 'merge': {
          const otherChains = Object.keys(lists).filter(k => k !== currentChain);
          const mergeMode = document.getElementById('merge-mode').value;
          
          if (mergeMode === 'append') {
            lists[otherChains[0]].traverse().forEach(v => list.addAtTail(v));
          } else {
            const values = lists[otherChains[0]].traverse().reverse();
            values.forEach(v => list.addAtHead(v));
          }
          
          closeModal();
          await animateMerge();
          break;
        }
      }

      showCode('traverse');
    }

    // 遍历操作
    async function traverse() {
      showCode('traverse');
      await animateTraverse();
    }

    // 获取长度
    function getLength() {
      const list = lists[currentChain];
      const length = list.getLength();
      updateStatus(`链表长度: ${length}`, 'success');
      setTimeout(() => updateStatus('状态: 就绪'), 2000);
    }

    // 翻转
    async function reverse() {
      showCode('reverse');
      await animateReverse();
    }

    // 排序
    async function sort() {
      showCode('sort');
      await animateSort();
    }

    // 检测环
    async function detectCycle() {
      showCode('detectCycle');
      updateStatus('正在检测环...');
      
      await new Promise(r => setTimeout(r, 500));
      
      const hasCycle = lists[currentChain].detectCycle();
      
      if (hasCycle) {
        updateStatus('检测到环: 链表存在循环!', 'error');
      } else {
        updateStatus('无环: 链表正常终止于 NULL', 'success');
      }
      setTimeout(() => {
        updateStatus('状态: 就绪');
        showCode('traverse');
      }, 2500);
    }

    // 复制链表
    function cloneChain() {
      const list = lists[currentChain];
      if (list.getLength() === 0) {
        updateStatus('链表为空，无法复制', 'error');
        return;
      }

      const cloned = list.clone();
      lists[currentChain] = cloned;
      renderChain();
      updateLengths();
      updateStatus('已复制链表!', 'success');
      setTimeout(() => updateStatus('状态: 就绪'), 2000);
    }

    // 清空链表
    function clearAll() {
      lists[currentChain].clear();
      renderChain();
      updateLengths();
      updateStatus('链表已清空 (保留哨兵节点)', 'success');
      setTimeout(() => {
        updateStatus('状态: 就绪');
        showCode('traverse');
      }, 2000);
    }

    // 重置全部
    function resetAll() {
      Object.keys(lists).forEach(type => {
        lists[type] = new LinkedList(type);
      });
      [5, 3, 8, 1, 9].forEach(v => {
        lists.singly.addAtTail(v);
        lists.doubly.addAtTail(v);
        lists.circular.addAtTail(v);
      });
      renderChain();
      updateLengths();
      updateStatus('已重置为初始数据', 'success');
      setTimeout(() => {
        updateStatus('状态: 就绪');
        showCode('traverse');
      }, 2000);
    }

    // 随机生成
    function generateRandom() {
      const len = parseInt(document.getElementById('random-length').value);
      if (isNaN(len) || len < 1 || len > 20) {
        alert('请输入1-20之间的长度');
        return;
      }
      
      Object.keys(lists).forEach(type => {
        lists[type] = new LinkedList(type);
        for (let i = 0; i < len; i++) {
          const value = Math.floor(Math.random() * 99) + 1;
          lists[type].addAtTail(value);
        }
      });
      renderChain();
      updateLengths();
      updateStatus(`已生成随机链表 (长度: ${len})`, 'success');
      setTimeout(() => {
        updateStatus('状态: 就绪');
        showCode('traverse');
      }, 2000);
    }

    // 启动
    init();
  </script>
</body>
</html>
