<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>可视化栈结构 - 全屏版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#7E22CE',
            secondary: '#6B21A8',
            orange: '#F97316',
            green: '#16A34A',
            red: '#DC2626',
            light: '#FAF5FF',
          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .card-shadow { box-shadow: 0 10px 25px -5px rgba(126, 34, 206, 0.15); }
      .btn-hover { @apply transition-all duration-300 hover:scale-105 active:scale-95; }
    }
    @keyframes stackPush {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes stackPop {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-30px); opacity: 0; }
    }
    .stack-item {
      width: 100% !important;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #7E22CE;
      color: white;
      border-radius: 6px;
      font-weight: 500;
      margin: 2px 0;
    }
    .push {
      animation: stackPush 0.3s ease forwards;
    }
    .pop {
      animation: stackPop 0.3s ease forwards;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-light font-inter m-0 p-0">
  <div class="w-screen h-screen flex flex-col">
    <!-- 顶部标题 -->
    <div class="bg-white card-shadow p-4 text-center flex-shrink-0">
      <h1 class="text-2xl md:text-3xl font-bold text-primary m-0 flex items-center justify-center">
        <i class="fa fa-stack-overflow mr-2"></i>可视化栈结构（全屏版）
      </h1>
      <p class="text-gray-500 text-sm m-0">Stack — 后进先出(LIFO) · 容量演示</p>
    </div>

    <!-- 主体内容：左右分栏全屏 -->
    <div class="flex flex-1 overflow-hidden">
      <!-- 左侧操作区 1/4 宽度 -->
      <div class="w-1/4 bg-white card-shadow m-3 p-5 rounded-xl flex flex-col">
        <h3 class="text-lg font-semibold text-primary mb-4 flex items-center">
          <i class="fa fa-cogs mr-2"></i>操作面板
        </h3>
        
        <div class="mb-4">
          <label class="text-sm text-gray-600 mb-1 block">入栈元素</label>
          <input 
            type="text" 
            id="val" 
            placeholder="输入数字"
            class="w-full border border-gray-200 rounded-lg px-4 py-3 outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition"
          />
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3">
          <button onclick="push()" class="btn-hover bg-primary text-white py-3 rounded-lg font-medium">
            <i class="fa fa-arrow-up mr-1"></i>入栈 push
          </button>
          <button onclick="pop()" class="btn-hover bg-orange text-white py-3 rounded-lg font-medium">
            <i class="fa fa-arrow-down mr-1"></i>出栈 pop
          </button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3">
          <button onclick="peek()" class="btn-hover bg-primary/80 text-white py-2.5 rounded-lg font-medium">
            <i class="fa fa-eye mr-1"></i>栈顶 peek
          </button>
          <button onclick="popAll()" class="btn-hover bg-red text-white py-2.5 rounded-lg font-medium">
            <i class="fa fa-trash mr-1"></i>清空 popAll
          </button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3">
          <button onclick="size()" class="btn-hover bg-green text-white py-2.5 rounded-lg font-medium">
            <i class="fa fa-hashtag mr-1"></i>大小 size
          </button>
          <button onclick="isEmpty()" class="btn-hover bg-primary/60 text-white py-2.5 rounded-lg font-medium">
            <i class="fa fa-question-circle mr-1"></i>判空 isEmpty
          </button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3">
          <button onclick="isFull()" class="btn-hover bg-orange/90 text-white py-2.5 rounded-lg font-medium">
            <i class="fa fa-exclamation-circle mr-1"></i>判满 isFull
          </button>
          <button onclick="randomStack()" class="btn-hover bg-green text-white py-2.5 rounded-lg font-medium">
            <i class="fa fa-random mr-1"></i>随机栈(0-10)
          </button>
        </div>

        <button onclick="printStack()" class="btn-hover w-full bg-secondary text-white py-3 rounded-lg font-medium mb-4">
          <i class="fa fa-list mr-1"></i>打印栈内容
        </button>

        <div id="msg" class="p-4 bg-gray-100 rounded-lg min-h-[60px] text-sm text-gray-700 transition-all mt-auto">
          等待操作...
        </div>
      </div>

      <!-- 右侧可视化区 3/4 宽度 -->
      <div class="w-3/4 bg-white card-shadow m-3 rounded-xl flex flex-col items-center justify-center p-6">
        <h3 class="text-xl font-semibold text-primary mb-4 flex items-center">
          <i class="fa fa-cube mr-2"></i>栈结构可视化
        </h3>

        <div class="mb-5 text-lg font-medium text-gray-700">
          当前栈高度：<span id="currentSize" class="text-primary font-bold text-xl">0</span> 
          / 最大容量：<span class="text-red font-bold text-xl">6</span>
        </div>

        <!-- 栈容器（更大、全屏视觉） -->
        <div class="w-[280px] h-[480px] relative border-4 border-primary/70 rounded-b-xl bg-primary/5 p-4">
          <div id="stackBody" class="w-full h-full flex flex-col-reverse items-center gap-1.5"></div>
        </div>

        <div class="mt-5 text-center text-gray-500 text-base">
          <p>栈顶 ↑</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MAX_CAPACITY = 6;

    class Stack {
      constructor() {
        this.items = [];
      }

      push(element) {
        if (this.isFull()) {
          return "栈已满，无法入栈！";
        }
        this.items.push(element);
        this.render();
        return element + " 入栈成功";
      }

      pop() {
        if (this.isEmpty()) return "栈为空，无法出栈";
        return this.items.pop() + " 出栈成功";
      }

      peek() {
        return this.isEmpty() ? "栈为空" : "栈顶：" + this.items.at(-1);
      }

      isEmpty() {
        return this.items.length === 0;
      }

      isFull() {
        return this.items.length >= MAX_CAPACITY;
      }

      size() {
        return "元素个数：" + this.items.length;
      }

      popAll() {
        this.items = [];
        this.render();
        return "已清空栈";
      }

      print() {
        return this.isEmpty() ? "栈为空" : "栈内容：[ " + this.items.join(", ") + " ]";
      }

      randomStack() {
        this.items = [];
        const count = Math.floor(Math.random() * 4) + 3;
        for (let i = 0; i < count; i++) {
          if (this.isFull()) break;
          this.items.push(Math.floor(Math.random() * 11));
        }
        this.render();
        return "已生成随机栈（0~10）";
      }

      render() {
        const box = document.getElementById('stackBody');
        const sizeLabel = document.getElementById('currentSize');
        box.innerHTML = '';
        sizeLabel.textContent = this.items.length;

        this.items.forEach(item => {
          const div = document.createElement('div');
          div.classList.add('stack-item', 'push');
          div.textContent = item;
          box.appendChild(div);
        });
      }
    }

    const stack = new Stack();
    const msg = document.getElementById('msg');

    function show(text) {
      msg.textContent = text;
      msg.classList.add('animate-pulse');
      setTimeout(() => msg.classList.remove('animate-pulse'), 300);
    }

    function push() {
      const v = document.getElementById('val').value.trim();
      if (!v) return show("请输入内容");
      show(stack.push(v));
      document.getElementById('val').value = '';
    }

    function pop() {
      show(stack.pop());
      stack.render();
    }

    function peek() { show(stack.peek()); }
    function isEmpty() { show(stack.isEmpty() ? "栈为空" : "栈不为空"); }
    function isFull() { show(stack.isFull() ? "栈已满" : "栈未满"); }
    function size() { show(stack.size()); }
    function popAll() { show(stack.popAll()); }
    function printStack() { show(stack.print()); }
    function randomStack() { show(stack.randomStack()); }

    document.getElementById('val').addEventListener('keypress', e => {
      if (e.key === 'Enter') push();
    });
  </script>
</body>
</html>
