<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>归并排序可视化</title>
    <link rel="icon" type="image/png" href="../../../images/tubiao.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#6366F1',
                        accent: '#EC4899',
                        dark: '#1E293B',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .sort-bar {
                transition: all 0.3s ease;
            }
            .sort-bar-sorted {
                @apply bg-green-500;
            }
            .sort-bar-compare {
                @apply bg-accent scale-y-105;
            }
            .sort-bar-pivot {
                @apply bg-yellow-500;
            }
            .btn-hover {
                @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1;
            }
            .glass-effect {
                @apply bg-white/10 backdrop-blur-md border border-white/20;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-dark to-slate-900 text-light min-h-screen font-inter">
    <header class="container mx-auto px-4 py-8 text-center">
        <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold bg-gradient-to-r from-primary to-secondary inline-block text-transparent bg-clip-text mb-2">
            归并排序可视化
        </h1>
        <p class="text-lg text-slate-300 max-w-2xl mx-auto">
            通过交互式动画直观理解归并排序的工作原理。归并排序采用分治法，将数组分成子数组，
            排序后合并，时间复杂度为 O(n log n)。
        </p>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 控制面板 -->
        <div class="glass-effect rounded-xl p-6 mb-8 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">数组大小</label>
                    <div class="flex items-center">
                        <input type="range" id="array-size" min="5" max="100" value="30" 
                            class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary">
                        <span id="array-size-value" class="ml-4 min-w-[3rem] text-center">30</span>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">排序速度 (ms)</label>
                    <div class="flex items-center">
                        <input type="range" id="sort-speed" min="1" max="500" value="100" 
                            class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary">
                        <span id="sort-speed-value" class="ml-4 min-w-[3rem] text-center">100</span>
                    </div>
                </div>
                
                <div class="flex items-end">
                    <button id="generate-array" class="bg-primary hover:bg-primary/90 text-white px-6 py-2 rounded-lg mr-4 btn-hover flex items-center">
                        <i class="fa-solid fa-refresh mr-2"></i> 生成数组
                    </button>
                    <button id="start-sort" class="bg-accent hover:bg-accent/90 text-white px-6 py-2 rounded-lg btn-hover flex items-center">
                        <i class="fa-solid fa-play mr-2"></i> 开始排序
                    </button>
                </div>
            </div>
        </div>

        <!-- 算法信息 -->
        <div class="glass-effect rounded-xl p-6 mb-8 shadow-xl">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <i class="fa-solid fa-info-circle text-primary mr-2"></i> 算法原理
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h3 class="text-lg font-medium mb-2 text-primary">归并排序步骤</h3>
                    <ol class="list-decimal pl-5 space-y-2 text-slate-300">
                        <li>将未排序的数组从中间分成两个子数组</li>
                        <li>递归地对每个子数组进行排序</li>
                        <li>合并已排序的子数组，生成最终的有序数组</li>
                    </ol>
                </div>
                <div>
                    <h3 class="text-lg font-medium mb-2 text-primary">算法特性</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-slate-800/50 rounded-lg p-3">
                            <p class="text-sm text-slate-400">时间复杂度</p>
                            <p class="font-bold text-lg">O(n log n)</p>
                        </div>
                        <div class="bg-slate-800/50 rounded-lg p-3">
                            <p class="text-sm text-slate-400">空间复杂度</p>
                            <p class="font-bold text-lg">O(n)</p>
                        </div>
                        <div class="bg-slate-800/50 rounded-lg p-3">
                            <p class="text-sm text-slate-400">稳定性</p>
                            <p class="font-bold text-lg">稳定</p>
                        </div>
                        <div class="bg-slate-800/50 rounded-lg p-3">
                            <p class="text-sm text-slate-400">策略</p>
                            <p class="font-bold text-lg">分治法</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 可视化区域 -->
        <div class="glass-effect rounded-xl p-4 h-[500px] mb-8 shadow-xl overflow-hidden relative">
            <div id="sorting-visualization" class="w-full h-full flex items-end justify-center space-x-[0.5%]">
                <!-- 排序条将在这里动态生成 -->
            </div>
            <div id="sorting-status" class="absolute top-4 left-4 bg-slate-800/80 text-white px-4 py-2 rounded-lg text-sm">
                准备就绪
            </div>
        </div>

        <!-- 排序过程记录 -->
        <div class="glass-effect rounded-xl p-6 mb-8 shadow-xl max-h-[300px] overflow-y-auto">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <i class="fa-solid fa-history text-primary mr-2"></i> 排序步骤记录
            </h2>
            <div id="sorting-steps" class="space-y-2 text-sm text-slate-300">
                <p>点击"开始排序"按钮开始可视化过程</p>
            </div>
        </div>
    </main>

    <footer class="container mx-auto px-4 py-8 text-center text-slate-500">
        <p>归并排序可视化工具 | 用动画展示算法原理</p>
    </footer>

    <script>
        // DOM 元素
        const arraySizeSlider = document.getElementById('array-size');
        const arraySizeValue = document.getElementById('array-size-value');
        const sortSpeedSlider = document.getElementById('sort-speed');
        const sortSpeedValue = document.getElementById('sort-speed-value');
        const generateArrayBtn = document.getElementById('generate-array');
        const startSortBtn = document.getElementById('start-sort');
        const visualizationContainer = document.getElementById('sorting-visualization');
        const sortingStatus = document.getElementById('sorting-status');
        const sortingSteps = document.getElementById('sorting-steps');

        // 全局变量
        let array = [];
        let isSorting = false;
        let animationSpeed = 100; // 毫秒
        let animationQueue = [];
        let stepCount = 0;

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            updateArraySize();
            updateSortSpeed();
            generateRandomArray();
            
            // 事件监听
            arraySizeSlider.addEventListener('input', updateArraySize);
            sortSpeedSlider.addEventListener('input', updateSortSpeed);
            generateArrayBtn.addEventListener('click', generateRandomArray);
            startSortBtn.addEventListener('click', startSorting);
        });

        // 更新数组大小显示
        function updateArraySize() {
            arraySizeValue.textContent = arraySizeSlider.value;
        }

        // 更新排序速度显示
        function updateSortSpeed() {
            sortSpeedValue.textContent = sortSpeedSlider.value;
            animationSpeed = parseInt(sortSpeedSlider.value);
        }

        // 生成随机数组
        function generateRandomArray() {
            if (isSorting) return;
            
            const size = parseInt(arraySizeSlider.value);
            array = [];
            
            for (let i = 0; i < size; i++) {
                // 生成10到450之间的随机高度
                const height = Math.floor(Math.random() * 440) + 10;
                array.push(height);
            }
            
            renderArray();
            resetSortingStatus();
        }

        // 渲染数组
        function renderArray(compareIndices = [], sortedIndices = []) {
            visualizationContainer.innerHTML = '';
            
            array.forEach((height, index) => {
                const bar = document.createElement('div');
                bar.className = 'sort-bar bg-primary rounded-t-md';
                bar.style.height = `${height}px`;
                bar.style.width = `${100 / array.length - 0.5}%`;
                
                // 高亮比较中的元素
                if (compareIndices.includes(index)) {
                    bar.classList.add('sort-bar-compare');
                } 
                // 高亮已排序的元素
                else if (sortedIndices.includes(index)) {
                    bar.classList.add('sort-bar-sorted');
                }
                
                visualizationContainer.appendChild(bar);
            });
        }

        // 重置排序状态
        function resetSortingStatus() {
            isSorting = false;
            startSortBtn.innerHTML = '<i class="fa-solid fa-play mr-2"></i> 开始排序';
            sortingStatus.textContent = '准备就绪';
            sortingSteps.innerHTML = '<p>点击"开始排序"按钮开始可视化过程</p>';
            stepCount = 0;
        }

        // 开始排序
        function startSorting() {
            if (isSorting) return;
            
            isSorting = true;
            startSortBtn.innerHTML = '<i class="fa-solid fa-stop mr-2"></i> 停止排序';
            sortingStatus.textContent = '排序中...';
            sortingSteps.innerHTML = '';
            
            animationQueue = [];
            const sortedArray = [...array];
            mergeSort(sortedArray, 0, sortedArray.length - 1);
            
            // 执行动画队列
            executeAnimationQueue();
        }

        // 归并排序实现
        function mergeSort(arr, left, right) {
            if (left >= right) return;
            
            const mid = Math.floor((left + right) / 2);
            
            // 记录分割步骤
            animationQueue.push({
                type: 'split',
                left,
                mid,
                right
            });
            
            // 递归排序左半部分
            mergeSort(arr, left, mid);
            
            // 递归排序右半部分
            mergeSort(arr, mid + 1, right);
            
            // 合并已排序的两部分
            merge(arr, left, mid, right);
        }

        // 合并两个已排序的子数组
        function merge(arr, left, mid, right) {
            const n1 = mid - left + 1;
            const n2 = right - mid;
            
            // 创建临时数组
            const L = new Array(n1);
            const R = new Array(n2);
            
            // 复制数据到临时数组 L[] 和 R[]
            for (let i = 0; i < n1; i++)
                L[i] = arr[left + i];
            for (let j = 0; j < n2; j++)
                R[j] = arr[mid + 1 + j];
            
            // 归并临时数组到 arr[left..right]
            let i = 0; // 初始化第一个子数组的索引
            let j = 0; // 初始化第二个子数组的索引
            let k = left; // 初始归并子数组的索引
            
            while (i < n1 && j < n2) {
                // 记录比较步骤
                animationQueue.push({
                    type: 'compare',
                    indices: [left + i, mid + 1 + j],
                    left: left + i,
                    right: mid + 1 + j
                });
                
                if (L[i] <= R[j]) {
                    arr[k] = L[i];
                    i++;
                } else {
                    arr[k] = R[j];
                    j++;
                }
                
                // 记录赋值步骤
                animationQueue.push({
                    type: 'assign',
                    index: k,
                    value: arr[k]
                });
                
                k++;
            }
            
            // 复制 L[] 的保留元素
            while (i < n1) {
                arr[k] = L[i];
                
                // 记录赋值步骤
                animationQueue.push({
                    type: 'assign',
                    index: k,
                    value: arr[k]
                });
                
                i++;
                k++;
            }
            
            // 复制 R[] 的保留元素
            while (j < n2) {
                arr[k] = R[j];
                
                // 记录赋值步骤
                animationQueue.push({
                    type: 'assign',
                    index: k,
                    value: arr[k]
                });
                
                j++;
                k++;
            }
            
            // 记录合并完成步骤
            animationQueue.push({
                type: 'merge',
                left,
                right
            });
        }

        // 执行动画队列
        async function executeAnimationQueue() {
            const sortedIndices = new Set();
            
            for (let i = 0; i < animationQueue.length; i++) {
                if (!isSorting) break;
                
                const step = animationQueue[i];
                
                switch (step.type) {
                    case 'split':
                        addStepToLog(`分割: 子数组 [${step.left}..${step.right}] 分成 [${step.left}..${step.mid}] 和 [${step.mid+1}..${step.right}]`);
                        await sleep(animationSpeed);
                        break;
                        
                    case 'compare':
                        addStepToLog(`比较: 位置 ${step.left} (${array[step.left]}) 和 ${step.right} (${array[step.right]})`);
                        renderArray([step.left, step.right], Array.from(sortedIndices));
                        await sleep(animationSpeed);
                        break;
                        
                    case 'assign':
                        array[step.index] = step.value;
                        renderArray([], Array.from(sortedIndices));
                        await sleep(animationSpeed / 2);
                        break;
                        
                    case 'merge':
                        addStepToLog(`合并: 子数组 [${step.left}..${step.right}] 已排序`);
                        // 将合并后的区域添加到已排序集合
                        for (let j = step.left; j <= step.right; j++) {
                            sortedIndices.add(j);
                        }
                        renderArray([], Array.from(sortedIndices));
                        await sleep(animationSpeed);
                        break;
                }
            }
            
            // 排序完成
            if (isSorting) {
                sortingComplete();
            }
        }

        // 添加步骤到日志
        function addStepToLog(message) {
            stepCount++;
            const stepElement = document.createElement('div');
            stepElement.className = 'p-2 rounded-lg bg-slate-800/30 hover:bg-slate-800/50 transition-colors';
            stepElement.innerHTML = `<span class="text-primary font-medium">步骤 ${stepCount}:</span> ${message}`;
            sortingSteps.appendChild(stepElement);
            sortingSteps.scrollTop = sortingSteps.scrollHeight;
        }

        // 排序完成处理
        function sortingComplete() {
            isSorting = false;
            startSortBtn.innerHTML = '<i class="fa-solid fa-play mr-2"></i> 开始排序';
            sortingStatus.textContent = '排序完成!';
            
            // 高亮所有元素表示完成
            renderArray([], array.map((_, i) => i));
            
            // 添加完成消息
            addStepToLog('归并排序已完成！🎉');
            
            // 闪烁所有元素以突出完成状态
            let flashCount = 0;
            const flashInterval = setInterval(() => {
                if (flashCount >= 6) {
                    clearInterval(flashInterval);
                    renderArray([], array.map((_, i) => i));
                    return;
                }
                
                if (flashCount % 2 === 0) {
                    renderArray([], []);
                } else {
                    renderArray([], array.map((_, i) => i));
                }
                
                flashCount++;
            }, 200);
        }

        // 睡眠函数
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
