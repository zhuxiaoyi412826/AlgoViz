<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - AlgoViz</title>
    <link rel="stylesheet" href="/styles/main.css">
    <script src="/js/main.js"></script>
    <!-- CodeMirror / Highlight.js or Prism for code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Marked for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* AI Page Specific Layout */
        body {
            overflow: hidden;
            background: var(--bg-dark);
        }
        
        .ai-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Styles */
        .ai-sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .sidebar-header {
            padding: var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: var(--spacing-md);
            padding: var(--spacing-sm) var(--spacing-md);
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-1px);
        }

        .history-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 var(--spacing-sm);
        }

        .history-list-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: var(--spacing-sm) var(--spacing-sm);
            margin-top: var(--spacing-sm);
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .history-item:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .history-item.active {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            font-weight: 500;
        }

        .history-item-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-delete {
            opacity: 0;
            color: var(--text-muted);
            border: none;
            background: none;
            cursor: pointer;
            padding: 2px;
        }

        .history-item:hover .history-item-delete {
            opacity: 1;
        }
        
        .history-item-delete:hover {
            color: var(--danger);
        }

        .sidebar-footer {
            padding: var(--spacing-md);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* AI Page Styles */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .ai-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: var(--spacing-lg) var(--spacing-lg) 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border);
            margin-bottom: var(--spacing-md);
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding-right: var(--spacing-sm);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .chat-message {
            display: flex;
            gap: var(--spacing-md);
            max-width: 95%;
        }

        .message-user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-ai {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message-user .message-avatar {
            background: var(--primary);
            color: white;
        }

        .message-ai .message-avatar {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
        }

        .message-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: var(--spacing-md);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            line-height: 1.6;
            position: relative;
            overflow: hidden;
        }

        .message-user .message-content {
            background: var(--primary-dark);
            color: white;
            border-color: var(--primary-dark);
            border-top-right-radius: 0;
        }

        .message-ai .message-content {
            border-top-left-radius: 0;
        }

        .message-content p {
            margin-bottom: 0.5rem;
        }
        .message-content p:last-child {
            margin-bottom: 0;
        }

        /* Markdown Styles in AI Message */
        .message-ai .message-content pre {
            background: #1e1e2e;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid #2d2d4a;
        }

        .message-ai .message-content pre code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
            color: #abb2bf; /* Fix for dark code block text */
            background: transparent;
            padding: 0;
            border-radius: 0;
        }

        .message-ai .message-content p code {
            background: rgba(102, 126, 234, 0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: var(--primary-light);
        }

        html[data-theme="light"] .message-ai .message-content pre {
            background: #282c34;
            border: 1px solid #e2e8f0;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .message-user .copy-btn {
            color: rgba(255,255,255,0.8);
        }

        .message-content:hover .copy-btn {
            opacity: 1;
        }
        
        .copy-btn:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.2);
        }

        .chat-input-area {
            padding: var(--spacing-sm) 0 var(--spacing-lg);
            background: var(--bg-dark);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .prompt-suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none; /* Firefox */
        }
        
        .prompt-suggestions::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .prompt-chip {
            white-space: nowrap;
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .prompt-chip:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary);
            border-color: rgba(102, 126, 234, 0.3);
        }

        /* List & Table formatting inside Markdown */
        .markdown-body ul, .markdown-body ol {
            padding-left: 2rem;
            margin-bottom: 1rem;
        }
        
        .markdown-body li {
            margin-bottom: 0.25rem;
        }

        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1rem;
        }

        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        .markdown-body th {
            background: var(--bg-card-hover);
            font-weight: 600;
        }

        .chat-input-wrapper {
            position: relative;
            display: flex;
            align-items: flex-end;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xs) var(--spacing-sm);
            transition: border-color 0.2s;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: var(--spacing-sm);
            resize: none;
            min-height: 44px;
            max-height: 200px;
            font-family: inherit;
            line-height: 1.5;
            outline: none;
        }

        .input-actions {
            display: flex;
            gap: 8px;
            padding: var(--spacing-sm);
        }

        .send-btn, .stop-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn {
            background: var(--primary);
            color: white;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .stop-btn {
            background: var(--bg-card-hover);
            color: var(--danger);
            border: 1px solid var(--border);
            display: none;
        }

        .stop-btn:hover {
            background: var(--border);
            color: #ff5555;
        }

        .stop-btn.visible {
            display: flex;
        }

        /* Loading Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2d2d4a;
            padding: 4px 12px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            font-size: 0.8rem;
            color: #a0a0b8;
            margin-bottom: -1rem; /* overlap pre padding */
        }
        
        .code-copy-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .code-copy-btn:hover {
            color: white;
        }

        /* 个人中心头像样式 (复用) */
        .nav-avatar {
            font-size: 1rem;
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            background: var(--primary);
            color: white;
        }

    </style>
</head>
<body onload="initTheme()">
    <div class="ai-layout">
        <!-- Sidebar -->
        <aside class="ai-sidebar">
            <div class="sidebar-header">
                <a href="javascript:history.back()" class="back-btn" title="返回上一页">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <span style="font-weight: 600; font-size: 1.1rem;" class="text-gradient">AlgoViz AI</span>
            </div>
            
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                新对话
            </button>

            <div class="history-list-container">
                <div class="history-list-title">历史对话</div>
                <div id="sessionList">
                    <!-- Sessions will be injected here -->
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <span class="nav-avatar" id="navAvatar">👤</span>
                    <span id="userNameDisplay">用户</span>
                </div>
                <button id="themeToggle" class="theme-switch" aria-label="切换主题" style="transform: scale(0.8);">
                    <div class="theme-switch-handle">
                        <span class="theme-icon">☀️</span>
                    </div>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="ai-container">
                <div class="chat-header" style="border-bottom: none; margin-bottom: 0;">
                    <div class="chat-title" id="currentChatTitle">
                        新对话
                    </div>
                </div>

                <div class="chat-history" id="chatHistory">
                    <!-- Messages will be injected here -->
                </div>

                <div class="chat-input-area">
                    <!-- Prompt Suggestions -->
                    <div class="prompt-suggestions" id="promptSuggestions">
                        <div class="prompt-chip" onclick="fillPrompt(this)">🔍 解释冒泡排序原理</div>
                        <div class="prompt-chip" onclick="fillPrompt(this)">🌲 二叉树的前中后序遍历有什么区别？</div>
                        <div class="prompt-chip" onclick="fillPrompt(this)">💻 用 Java 实现快速排序</div>
                        <div class="prompt-chip" onclick="fillPrompt(this)">⏱️ 常见排序算法的时间复杂度总结</div>
                        <div class="prompt-chip" onclick="fillPrompt(this)">🛤️ Dijkstra 算法是如何寻找最短路径的？</div>
                    </div>

                    <div class="chat-input-wrapper">
                        <textarea 
                            class="chat-input" 
                            id="chatInput" 
                            placeholder="输入你的问题，按 Enter 发送，Shift + Enter 换行..." 
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <button class="stop-btn" id="stopBtn" title="停止生成">⏹</button>
                            <button class="send-btn" id="sendBtn" title="发送 (Enter)" disabled>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>
                    </div>
                    <div style="text-align: center; color: var(--text-muted); font-size: 0.75rem; margin-top: 8px;">
                        AI 可能产生不准确的信息，请核实重要内容。
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
    (function() {
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('algoviz-theme', theme);
            var btn = document.getElementById('themeToggle');
            if (btn) {
                var icon = btn.querySelector('.theme-icon');
                if (icon) {
                    icon.textContent = theme === 'dark' ? '🌙' : '☀️';
                }
            }
        }
        
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme') || 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            setTheme(next);
        }
        
        // 检查登录状态并更新头像
        function checkLoginStatus() {
            var isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            var navAvatar = document.getElementById('navAvatar');
            var userNameDisplay = document.getElementById('userNameDisplay');
            
            if (isLoggedIn) {
                navAvatar.textContent = localStorage.getItem('userAvatar') || '👤';
                userNameDisplay.textContent = localStorage.getItem('username') || '已登录用户';
            } else {
                navAvatar.textContent = '👨';
                userNameDisplay.textContent = '未登录';
            }
        }
        
        window.toggleTheme = toggleTheme;
        var saved = localStorage.getItem('algoviz-theme') || 'light';
        setTheme(saved);
        
        document.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('themeToggle');
            if (btn) btn.addEventListener('click', toggleTheme);
            checkLoginStatus();
        });
    })();
    </script>

    <script src="/js/ai-chat.js"></script>
</body>
</html>
