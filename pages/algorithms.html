<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算法演示 - AlgoViz</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/algorithms.css">
    <link rel="stylesheet" href="/styles/oj.css">
    <script src="/js/main.js"></script>
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
    <!-- html2canvas & gif.js for export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body onload="initTheme()">
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="/index.html" class="nav-logo">
                <span class="nav-logo-icon">📊</span>
                <span class="text-gradient">AlgoViz</span>
            </a>
            <div class="nav-links">
                <a href="/index.html" class="nav-link">首页</a>
                <a href="/pages/datastructures.html" class="nav-link">数据结构</a>
                <a href="/pages/algorithms.html" class="nav-link active">算法演示</a>
            </div>
            <div class="nav-actions">
                <button id="themeToggle" onclick="toggleTheme()" style="width:38px;height:38px;border-radius:50%;border:1px solid #2d2d4a;background:#1a1a2e;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="container" style="padding-top: 2rem; padding-bottom: 2rem;">
            <!-- Mode Tabs -->
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="visualization">
                    <span class="mode-tab-icon">📊</span>
                    <span>算法演示</span>
                </button>
                <button class="mode-tab" data-mode="oj">
                    <span class="mode-tab-icon">💻</span>
                    <span>在线OJ</span>
                </button>
            </div>

            <!-- Visualization Mode -->
            <div class="visualization-mode" id="visualizationMode">
                <!-- Algorithm Selector -->
                <div class="algo-category">
                    <h2 style="margin-bottom: 1rem;">排序算法</h2>
                    <div class="algo-grid" id="sortingAlgos">
                        <button class="algo-btn active" data-algo="bubbleSort">
                            <span class="algo-icon">🫧</span>
                            <span class="algo-name">冒泡排序</span>
                        </button>
                        <button class="algo-btn" data-algo="selectionSort">
                            <span class="algo-icon">👆</span>
                            <span class="algo-name">选择排序</span>
                        </button>
                        <button class="algo-btn" data-algo="insertionSort">
                            <span class="algo-icon">📥</span>
                            <span class="algo-name">插入排序</span>
                        </button>
                        <button class="algo-btn" data-algo="quickSort">
                            <span class="algo-icon">⚡</span>
                            <span class="algo-name">快速排序</span>
                        </button>
                        <button class="algo-btn" data-algo="mergeSort">
                            <span class="algo-icon">🔀</span>
                            <span class="algo-name">归并排序</span>
                        </button>
                        <button class="algo-btn" data-algo="heapSort">
                            <span class="algo-icon">🏔️</span>
                            <span class="algo-name">堆排序</span>
                        </button>
                    </div>
                </div>

                <div class="algo-category" id="searching">
                    <h2 style="margin-bottom: 1rem;">查找算法</h2>
                    <div class="algo-grid">
                        <button class="algo-btn" data-algo="binarySearch">
                            <span class="algo-icon">🔎</span>
                            <span class="algo-name">二分查找</span>
                        </button>
                    </div>
                </div>

                <div class="algo-category" id="tree-traversal">
                    <h2 style="margin-bottom: 1rem;">树遍历</h2>
                    <div class="algo-grid">
                        <button class="algo-btn" data-algo="treeInorder">
                            <span class="algo-icon">↔️</span>
                            <span class="algo-name">中序遍历</span>
                        </button>
                        <button class="algo-btn" data-algo="treePreorder">
                            <span class="algo-icon">➡️</span>
                            <span class="algo-name">前序遍历</span>
                        </button>
                        <button class="algo-btn" data-algo="treePostorder">
                            <span class="algo-icon">⬅️</span>
                            <span class="algo-name">后序遍历</span>
                        </button>
                    </div>
                </div>

                <div class="algo-category" id="graph-traversal">
                    <h2 style="margin-bottom: 1rem;">图遍历</h2>
                    <div class="algo-grid">
                        <button class="algo-btn" data-algo="graphDFS">
                            <span class="algo-icon">🧭</span>
                            <span class="algo-name">深度优先 (DFS)</span>
                        </button>
                        <button class="algo-btn" data-algo="graphBFS">
                            <span class="algo-icon">🌊</span>
                            <span class="algo-name">广度优先 (BFS)</span>
                        </button>
                    </div>
                </div>

                <div class="algo-category" id="dijkstra">
                    <h2 style="margin-bottom: 1rem;">最短路径</h2>
                    <div class="algo-grid">
                        <button class="algo-btn" data-algo="dijkstra">
                            <span class="algo-icon">🛤️</span>
                            <span class="algo-name">Dijkstra</span>
                        </button>
                    </div>
                </div>

                <!-- Main Layout -->
                <div class="algo-main-layout">
                    <!-- Left Column -->
                    <div class="algo-left-column">
                        <!-- Info Panel -->
                        <div class="info-panel" id="algoInfoPanel">
                            <h3 class="panel-title" id="algoTitle">冒泡排序 Bubble Sort</h3>
                            <div class="info-item">
                                <span class="info-label">简介</span>
                                <span class="info-value" id="algoDescription">通过相邻元素的比较和交换，把最大的元素逐步"冒泡"到数组末端。</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">时间复杂度</span>
                                <div class="info-value">
                                    <span class="complexity-badge" id="algoTimeBest">最优 O(n)</span>
                                    <span class="complexity-badge" id="algoTimeAvg">平均 O(n²)</span>
                                    <span class="complexity-badge" id="algoTimeWorst">最坏 O(n²)</span>
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-label">空间复杂度</span>
                                <div class="info-value">
                                    <span class="complexity-badge" id="algoSpace">O(1)</span>
                                </div>
                            </div>
                            <div class="info-item">
                                <span class="info-label">核心思路</span>
                                <span class="info-value" id="algoCoreIdea">重复遍历数组，比较相邻元素并在必要时交换位置，直到没有更多交换为止。</span>
                            </div>
                        </div>

                        <!-- Control Panel -->
                        <div class="control-panel" id="algoControlPanel">
                            <div class="control-section">
                                <div class="control-section-title">数据设置</div>
                                <div class="form-group">
                                    <label class="form-label">数组大小</label>
                                    <input type="range" class="form-range" id="arraySizeSlider" min="5" max="20" value="10">
                                    <span id="arraySizeValue">10</span>
                                </div>
                                <div class="control-row" style="margin-top: 1rem;">
                                    <button class="btn btn-secondary" id="algoRandomBtn">生成随机数据</button>
                                    <input type="text" class="form-input" id="algoDataInput" placeholder="手动输入 (逗号分隔)" style="flex: 1;">
                                </div>
                                <div class="control-row" style="margin-top: 0.75rem;">
                                    <label class="file-upload-btn">
                                        <input type="file" id="algoFileInput" accept=".txt,.json,.csv" hidden>
                                        <span>📁 上传文件</span>
                                    </label>
                                    <span id="algoFileName" class="file-name" style="display: none;"></span>
                                    <button class="btn btn-ghost" id="algoLoadFileBtn" style="display: none;">加载</button>
                                </div>
                                <div class="input-presets" id="algoInputPresets">
                                    <span class="preset-label">快速预设:</span>
                                    <button class="preset-btn" data-preset="random10">随机10个</button>
                                    <button class="preset-btn" data-preset="random20">随机20个</button>
                                    <button class="preset-btn" data-preset="nearlySorted">近乎有序</button>
                                    <button class="preset-btn" data-preset="reversed">倒序</button>
                                </div>
                            </div>

                            <div class="control-section" id="searchTargetSection" style="display: none;">
                                <div class="control-section-title">查找目标</div>
                                <input type="number" class="form-input" id="searchTarget" placeholder="输入要查找的值">
                            </div>

                            <div class="control-section" id="graphConfigSection" style="display: none;">
                                <div class="control-section-title">图设置</div>
                                <button class="btn btn-secondary" id="generateGraphBtn">生成随机图</button>
                            </div>

                            <div class="control-section">
                                <div class="control-section-title">动画控制</div>
                                <div class="control-row">
                                    <div class="control-btn-group">
                                        <button class="control-btn" id="algoPlayBtn" title="播放">
                                            ▶
                                        </button>
                                        <button class="control-btn" id="algoPauseBtn" title="暂停" disabled>
                                            ⏸
                                        </button>
                                        <button class="control-btn" id="algoStepBackBtn" title="上一步">
                                            ⏮
                                        </button>
                                        <button class="control-btn" id="algoStepForwardBtn" title="下一步">
                                            ⏭
                                        </button>
                                        <button class="control-btn" id="algoResetBtn" title="重置">
                                            ↻
                                        </button>
                                    </div>
                                </div>
                                <div class="control-row" style="margin-top: 1rem;">
                                    <label class="form-label" style="min-width: auto; margin-right: 1rem;">速度</label>
                                    <input type="range" class="form-range" id="algoSpeedSlider" min="50" max="1500" value="300">
                                    <span id="algoSpeedValue">1x</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="algo-right-column">
                        <!-- Visualization Area -->
                        <div class="visualization-container">
                            <div class="viz-header">
                                <h3 id="algoVizTitle">排序可视化</h3>
                                <div class="viz-header-actions">
                                    <span id="algoVizStatus" class="viz-status">就绪</span>
                                    <button class="export-btn" id="exportGifBtn" title="导出GIF">
                                        <span>🎬</span> 导出动画
                                    </button>
                                </div>
                            </div>
                            <div class="visualization-canvas" id="algoVisualizationCanvas">
                                <!-- Dynamic visualization content -->
                            </div>
                        </div>

                        <!-- Pseudocode Panel -->
                        <div class="pseudocode-panel" id="algoPseudocodePanel">
                            <div class="control-section-title">伪代码</div>
                            <div id="algoPseudocodeContent">
                                <!-- Dynamic pseudocode will be inserted here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- OJ Mode -->
            <div class="oj-mode" id="ojMode" style="display: none;">
                <!-- OJ Main Layout -->
                <div class="oj-main-layout">
                    <!-- Left: Problem List + Description -->
                    <div class="oj-left-column">
                        <!-- Problem List -->
                        <div class="oj-problem-list" id="ojProblemList">
                            <div class="oj-panel-header">
                                <h3>题目列表</h3>
                            </div>
                            <div class="oj-problems">
                                <!-- Problem items will be rendered here -->
                            </div>
                        </div>

                        <!-- Problem Description -->
                        <div class="oj-problem-desc" id="ojProblemDesc">
                            <div class="oj-panel-header">
                                <h3 id="ojProblemTitle">请选择题目</h3>
                                <span class="oj-problem-difficulty" id="ojProblemDifficulty"></span>
                            </div>
                            <div class="oj-problem-content" id="ojProblemContent">
                                <p class="oj-placeholder">从左侧选择一个题目开始 coding</p>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Editor + Result -->
                    <div class="oj-right-column">
                        <!-- Editor Header -->
                        <div class="oj-editor-header">
                            <div class="oj-lang-selector">
                                <label>语言:</label>
                                <select id="ojLangSelect" class="form-select">
                                    <option value="java" selected>Java</option>
                                    <option value="python">Python</option>
                                    <option value="cpp">C++</option>
                                    <option value="javascript">JavaScript</option>
                                </select>
                            </div>
                            <div class="oj-editor-actions">
                                <button class="oj-btn oj-btn-icon" id="ojFormatBtn" title="格式化">
                                    <span>🎨</span> 格式化
                                </button>
                                <button class="oj-btn oj-btn-icon" id="ojClearBtn" title="清空">
                                    <span>🗑️</span> 清空
                                </button>
                                <button class="oj-btn oj-btn-icon" id="ojCopyBtn" title="复制">
                                    <span>📋</span> 复制
                                </button>
                            </div>
                        </div>

                        <!-- Code Editor -->
                        <div class="oj-editor-container">
                            <textarea id="ojCodeEditor"></textarea>
                        </div>

                        <!-- Editor Footer -->
                        <div class="oj-editor-footer">
                            <div class="oj-custom-input">
                                <label>自定义输入:</label>
                                <textarea id="ojCustomInput" placeholder="(可选) 输入测试数据"></textarea>
                            </div>
                            <div class="oj-submit-actions">
                                <button class="oj-btn oj-btn-run" id="ojRunBtn">
                                    <span>▶</span> 运行代码
                                </button>
                                <button class="oj-btn oj-btn-submit" id="ojSubmitBtn">
                                    <span>📤</span> 提交代码
                                </button>
                            </div>
                        </div>

                        <!-- Result Panel -->
                        <div class="oj-result-panel" id="ojResultPanel">
                            <div class="oj-result-header">
                                <h3>运行结果</h3>
                                <div class="oj-result-tabs">
                                    <button class="oj-result-tab active" data-tab="output">输出</button>
                                    <button class="oj-result-tab" data-tab="submit">提交</button>
                                </div>
                            </div>
                            <div class="oj-result-content">
                                <div class="oj-result-body" id="ojResultBody">
                                    <p class="oj-placeholder">点击"运行代码"或"提交代码"查看结果</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>

    <script src="/js/algorithms/sorting.js"></script>
    <script src="/js/algorithms/searching.js"></script>
    <script src="/js/algorithms/traversal.js"></script>
    <script src="/js/algorithms/graph.js"></script>
    <script src="/js/algorithms/dijkstra.js"></script>
    <script src="/js/algorithms.js"></script>
    <script src="/js/oj.js"></script>
</body>
</html>
