    <style>
        /* 个人中心头像样式 */
        .nav-avatar {
            font-size: 1rem;
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            transition: all 0.2s ease;
        }
        
        .nav-avatar:hover {
            transform: scale(1.1);
        }
        
        .visit-counter {
            margin-right: 1rem;
            padding: 0.5rem 1rem;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body onload="initTheme()">
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="/index.html" class="nav-logo">
                <span class="nav-logo-icon">📊</span>
                <span class="text-gradient">AlgoViz</span>
            </a>
            <div class="nav-links">
                <a href="/index.html" class="nav-link">首页</a>
                <a href="/pages/datastructures.html" class="nav-link active">数据结构</a>
                <a href="/pages/algorithms.html" class="nav-link">算法演示</a>
                <a href="/pages/oj.html" class="nav-link">在线OJ</a>
                <a href="/pages/products.html" class="nav-link">商品</a>
                <a href="javascript:void(0)" class="nav-link" id="profileLink">
                    <span class="nav-avatar" id="navAvatar">👤</span>
                </a>
                <a href="/pages/ai.html" class="nav-link ai-link">
                    <span>✨</span> AI助手
                </a>
            </div>
            <div class="nav-actions">
                <div class="visit-counter">访问量: <span id="visitCount">0</span></div>
                <button id="themeToggle" class="theme-switch" aria-label="切换主题">
                    <div class="theme-switch-handle">
                        <span class="theme-icon">☀️</span>
                    </div>
                </button>
            </div>
        </div>
    </nav>

    <script>
    (function() {
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('algoviz-theme', theme);
            var btn = document.getElementById('themeToggle');
            if (btn) {
                var icon = btn.querySelector('.theme-icon');
                if (icon) {
                    icon.textContent = theme === 'dark' ? '🌙' : '☀️';
                }
            }
            document.body.style.background = theme === 'dark' ? '#0f0f23' : '#f5f7fa';
        }
        
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme') || 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            setTheme(next);
        }
        
        // 访问量计数
        function updateVisitCount() {
            var count = localStorage.getItem('visitCount') || 0;
            var visitCountElement = document.getElementById('visitCount');
            if (visitCountElement) {
                visitCountElement.textContent = count;
            }
        }
        
        // 检查登录状态并更新头像
        function checkLoginStatus() {
            var isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            var navAvatar = document.getElementById('navAvatar');
            var profileLink = document.getElementById('profileLink');
            
            if (isLoggedIn) {
                var userAvatar = localStorage.getItem('userAvatar') || '👤';
                navAvatar.textContent = userAvatar;
                profileLink.href = '/pages/profile.html';
            } else {
                navAvatar.textContent = '👨';
                profileLink.href = '/pages/login.html';
            }
        }
        
        window.toggleTheme = toggleTheme;
        
        var saved = localStorage.getItem('algoviz-theme') || 'light';
        setTheme(saved);
        
        var btn = document.getElementById('themeToggle');
        if (btn) {
            btn.addEventListener('click', toggleTheme);
        }
        
        // 检查登录状态
        checkLoginStatus();
        
        // 更新访问量显示
        updateVisitCount();
    })();
    </script>

    <!-- Main Content -->
    <main class="main">
        <div class="container" style="padding-top: 2rem; padding-bottom: 2rem;">
            <!-- Data Structure Selector -->
            <div class="ds-selector">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">选择数据结构</h2>
                <div class="ds-grid">
                    <button class="ds-btn" data-ds="array" id="array">
                        <span class="ds-icon">📦</span>
                        <span class="ds-name">数组</span>
                    </button>
                    <button class="ds-btn" data-ds="linkedlist" id="linkedlist">

                    </button>
                    <button class="ds-btn" data-ds="stack" id="stack">

                        <span class="ds-name">栈</span>
                    </button>
                    <button class="ds-btn" data-ds="queue" id="queue">

                    </button>
                    <button class="ds-btn" data-ds="tree" id="tree">

                    </button>
                    <button class="ds-btn" data-ds="hash" id="hash">

                    </button>
                    <button class="ds-btn" data-ds="graph" id="graph">
                        <span class="ds-icon">🕸️</span>
                        <span class="ds-name">图</span>
                    </button>
                    <button class="ds-btn" data-ds="heap" id="heap">
                        <span class="ds-icon">🏔️</span>
                        <span class="ds-name">堆</span>
                    </button>
                </div>
            </div>    
        </div>
