<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AlgoViz</title>
    <link rel="icon" type="image/png" href="../images/tubiao.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* 继承主样式，简化这里的重复代码 */
        @import url('../styles/main.css');
        
        body {
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }
        
        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        .nav-link:hover {
            color: var(--text-primary);
        }
        
        .nav-link.active {
            color: var(--primary);
        }
        
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .visit-counter {
            margin-right: 1rem;
            padding: 0.5rem 1rem;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .login-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        
        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .login-desc {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }
        
        .qrcode-section {
            margin-bottom: 2rem;
        }
        
        .qrcode-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        
        .qrcode {
            width: 240px;
            height: 240px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .qrcode img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .qrcode-avatar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--card-bg);
        }
        
        .qrcode-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .login-instructions {
            margin-bottom: 2rem;
        }
        
        .instruction-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            text-align: left;
        }
        
        .instruction-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        
        .instruction-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .verification-section {
            margin-bottom: 2rem;
        }
        
        .verification-code {
            font-family: 'Fira Code', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }
        
        .countdown {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .login-footer {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }
        
        .refresh-btn {
            padding: 0.75rem 1.5rem;
            background: var(--hover-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .refresh-btn:hover {
            border-color: var(--primary);
        }
        
        .login-btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: 1rem;
        }
        
        .login-btn:hover {
            background: var(--secondary);
        }
        
        @media (max-width: 768px) {
            .nav-container {
                padding: 0 1rem;
            }
            
            .nav-links {
                gap: 1rem;
            }
            
            .login-container {
                padding: 2rem;
            }
            
            .qrcode {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <span class="nav-logo-icon">📊</span>
                <span class="text-gradient">AlgoViz</span>
            </a>
            <div class="nav-links">
                <a href="../index.html" class="nav-link">首页</a>
                <a href="../pages/datastructures.html" class="nav-link">数据结构</a>
                <a href="../pages/algorithms.html" class="nav-link">算法演示</a>
                <a href="../pages/oj.html" class="nav-link">在线OJ</a>
                <a href="../pages/products.html" class="nav-link">商品</a>
                <a href="../pages/login.html" class="nav-link active" id="profileLink" title="用户中心">
                    <span class="nav-avatar" id="userAvatarSpan">👨</span>
                </a>
                <a href="../pages/ai.html" class="nav-link ai-link">
                    <span>✨</span> AI助手
                </a>
            </div>
            <div class="nav-actions">
                <div class="visit-counter" id="visitCounter">访问量: <span id="visitCount">加载中...</span></div>
                <button id="themeToggle" class="theme-switch" aria-label="切换主题">
                    <div class="theme-switch-handle">
                        <span class="theme-icon">☀️</span>
                    </div>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="login-container">
            <h1 class="login-title">登录 AlgoViz</h1>
            <p class="login-desc">通过微信公众号扫码登录</p>
            
            <div class="qrcode-section">
                <div class="qrcode-container">
                    <div class="qrcode">
                        <!-- 这里可以放置真实的二维码图片 -->
                        <div style="width: 100%; height: 100%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; color: #666;">
                            微信公众号二维码
                        </div>
                    </div>
                    <div class="qrcode-avatar">
                        <!-- 这里可以放置公众号头像 -->
                        <div style="width: 100%; height: 100%; background: #3a86ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white;">
                            📱
                        </div>
                    </div>
                </div>
            </div>
            
        
            
            <div class="verification-section">
                <div class="verification-code">804909</div>
                <div class="countdown">
                    <span id="countdown">117</span> 秒后过期
                </div>
            </div>
            
            <div class="login-footer">
                <button class="refresh-btn" onclick="refreshCode()">刷新验证码</button>
                <button class="login-btn" onclick="doLogin()">确认登录</button>
            </div>
        </div>
    
    
    
    </main>

    <script>
    (function() {
        // API基础URL配置
        var API_BASE_URL = 'http://localhost:81';
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('algoviz-theme', theme);
            var btn = document.getElementById('themeToggle');
            if (btn) {
                var icon = btn.querySelector('.theme-icon');
                if (icon) {
                    icon.textContent = theme === 'dark' ? '🌙' : '☀️';
                }
            }
            document.body.style.background = theme === 'dark' ? '#0f0f23' : '#f5f7fa';
        }
        
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme') || 'light';
            var next = current === 'dark' ? 'light' : 'dark';
            setTheme(next);
        }
        
        // 访问量计数
        function updateVisitCount() {
            var count = localStorage.getItem('visitCount') || 0;
            
            // 检查当前浏览器是否已经记录过访问
            var hasVisited = localStorage.getItem('hasVisitedUnique');
            if (!hasVisited) {
                count = parseInt(count) + 1;
                localStorage.setItem('visitCount', count);
                localStorage.setItem('hasVisitedUnique', 'true');
            }
            
            var visitCountElement = document.getElementById('visitCount');
            if (visitCountElement) {
                visitCountElement.textContent = count;
            }
        }
        
        // 倒计时功能
        function startCountdown(seconds) {
            var countdownElement = document.getElementById('countdown');
            if (!countdownElement) return;
            
            var remaining = seconds || 117;
            countdownElement.textContent = remaining;
            
            var interval = setInterval(function() {
                remaining--;
                countdownElement.textContent = remaining;
                
                if (remaining <= 0) {
                    clearInterval(interval);
                }
            }, 1000);
        }
        
        // 从后端获取验证码
        async function fetchVerificationCode() {
            try {
                var response = await fetch(API_BASE_URL + '/api/login/verification-code', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    var data = await response.text();
                    var verificationCode = document.querySelector('.verification-code');
                    if (verificationCode) {
                        verificationCode.textContent = data;
                    }
                    startCountdown(117);
                    return data;
                } else {
                    console.error('获取验证码失败:', response.status);
                    return null;
                }
            } catch (error) {
                console.error('获取验证码失败:', error);
                return null;
            }
        }
        
        // 刷新验证码
        function refreshCode() {
            fetchVerificationCode();
        }
        
        // 执行登录
        async function doLogin() {
            var verificationCode = document.querySelector('.verification-code');
            var code = verificationCode ? verificationCode.textContent : '';
            
            try {
                var response = await fetch(API_BASE_URL + '/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        code: 'wechat_code_' + Date.now(),
                        verificationCode: code
                    })
                });
                
                var result = await response.json();
                
                if (result.success) {
                    // 登录成功，保存用户信息
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userAvatar', result.userInfo.avatar || '👤');
                    localStorage.setItem('userInfo', JSON.stringify(result.userInfo));
                    localStorage.setItem('token', result.token);
                    
                    alert('登录成功！');
                    window.location.href = '/pages/profile.html';
                } else {
                    alert('登录失败: ' + result.message);
                }
            } catch (error) {
                console.error('登录失败:', error);
                alert('登录失败，请检查网络连接');
            }
        }
        
        // 模拟登录成功（保留用于测试）
        function simulateLogin() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userAvatar', '👤');
            window.location.href = '/pages/profile.html';
        }
        
        window.toggleTheme = toggleTheme;
        window.refreshCode = refreshCode;
        window.doLogin = doLogin;
        
        var saved = localStorage.getItem('algoviz-theme') || 'light';
        setTheme(saved);
        
        var btn = document.getElementById('themeToggle');
        if (btn) {
            btn.addEventListener('click', toggleTheme);
        }
        
        // 初始化时获取验证码
        fetchVerificationCode();
        
        // 更新访问量显示
        updateVisitCount();
        
        // 模拟登录（实际项目中应该由后端处理）
        // 注释掉自动登录的定时器，实际项目中应该由用户扫码后触发
        // setTimeout(simulateLogin, 10000); // 10秒后模拟登录成功
    })();
    </script>
</body>
</html>
